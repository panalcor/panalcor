<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#c9a227">
<title>PANALCOR</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1b2a;color:#f0f4f8;font-family:'Barlow',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;flex-direction:column;gap:18px;padding:20px}
.logo{font-size:1.6rem;font-weight:900;letter-spacing:0.12em;color:#c9a227}
.loader{width:44px;height:44px;border:4px solid rgba(201,162,39,0.2);
  border-top-color:#c9a227;border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:0.85rem;color:rgba(255,255,255,0.45);letter-spacing:0.08em;text-align:center}
.maq-name{font-size:1.1rem;font-weight:700;color:#f0f4f8;letter-spacing:0.05em;
  text-align:center;min-height:1.4em}
</style>
</head>
<body>
<div class="logo">PANALCOR</div>
<div class="maq-name" id="maqName"></div>
<div class="loader"></div>
<div class="msg" id="msg">Identificando usuario...</div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var id     = params.get('id') || '';
  var nombre = params.get('n')  || id;

  if(nombre) document.getElementById('maqName').textContent = nombre;

  var ps = null;
  try{ ps = JSON.parse(localStorage.getItem('panalcor_session') || 'null'); }catch(e){}

  if(!ps || Date.now() >= ps.expires){
    document.getElementById('msg').textContent = 'Redirigiendo al inicio de sesion...';
    window.location.replace('panalcor_inicio.html?back=' + encodeURIComponent(window.location.href));
    return;
  }

  var rol = ps.rol;
  if(rol === 'mecanico'){
    document.getElementById('msg').textContent = 'Abriendo registro de averia...';
    window.location.replace('averias.html?maq=' + encodeURIComponent(id));
  } else if(rol === 'encargado'){
    document.getElementById('msg').textContent = 'Abriendo panel de encargado...';
    window.location.replace('encargados.html?maq=' + encodeURIComponent(id));
  } else if(rol === 'admin'){
    document.getElementById('msg').textContent = 'Abriendo ficha de maquina...';
    window.location.replace('admin.html#maq');
  } else {
    window.location.replace('panalcor_inicio.html');
  }
})();
</script>
</body>
</html>
