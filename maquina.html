*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1b2a;color:#f0f4f8;font-family:'Barlow',sans-serif;min-height:100vh;font-size:1rem}

/* ── Topbar ── */
.topbar{background:#1a2d42;border-bottom:2px solid #c9a227;padding:12px 16px;display:flex;align-items:center;gap:10px}
.topbar-logo{font-size:0.75rem;font-weight:900;letter-spacing:0.12em;color:#c9a227;text-transform:uppercase}
.topbar-sub{font-size:0.68rem;color:rgba(255,255,255,0.4);margin-top:1px}
.topbar a{margin-left:auto;color:rgba(255,255,255,0.4);font-size:0.78rem;text-decoration:none;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:5px 10px}

/* ── Pantalla de identificación ── */
.id-screen{position:fixed;inset:0;background:#0d1b2a;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px}
.id-screen h2{font-size:1.3rem;font-weight:900;color:#c9a227;text-align:center}
.id-screen p{font-size:0.85rem;color:rgba(255,255,255,0.5);text-align:center}
.mec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:340px}
.mec-btn{background:#1a2d42;border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:14px 10px;font-size:0.95rem;font-weight:700;color:#fff;cursor:pointer;text-align:center;transition:all .15s;font-family:'Barlow',sans-serif;letter-spacing:0.03em}
.mec-btn:active{background:rgba(201,162,39,0.2);border-color:#c9a227;color:#c9a227}

/* ── Main ── */
.main{padding:16px;max-width:480px;margin:0 auto}

/* ── Ficha máquina ── */
.maq-card{background:#1a2d42;border-radius:14px;padding:18px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.08)}
.maq-id{font-size:0.7rem;letter-spacing:0.18em;color:#c9a227;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.maq-nombre{font-size:1.4rem;font-weight:900;line-height:1.1;margin-bottom:4px}
.maq-meta{font-size:0.78rem;color:rgba(255,255,255,0.45)}
.estado-chip{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:5px 14px;font-size:0.78rem;font-weight:700;border:1px solid;margin-top:12px}

/* ── Avería abierta ── */
.averia-abierta{background:rgba(231,76,60,0.12);border:2px solid rgba(231,76,60,0.5);border-radius:14px;padding:16px;margin-bottom:16px}
.averia-abierta .av-titulo{font-size:1rem;font-weight:900;color:#e74c3c;margin-bottom:8px}
.averia-abierta .av-info{font-size:0.82rem;color:rgba(255,255,255,0.7);line-height:1.6}
.averia-abierta .av-desc{font-size:0.88rem;color:rgba(255,255,255,0.9);margin-top:8px;font-style:italic}

/* ── Botones de acción ── */
.btn-averia{width:100%;padding:18px;background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;border:none;border-radius:14px;font-family:'Barlow',sans-serif;font-size:1.15rem;font-weight:900;letter-spacing:0.06em;cursor:pointer;margin-bottom:12px;transition:opacity .15s;box-shadow:0 4px 20px rgba(231,76,60,0.35)}
.btn-averia:active{opacity:0.85}
.btn-solucionado{width:100%;padding:18px;background:linear-gradient(135deg,#1e8449,#2ecc71);color:#fff;border:none;border-radius:14px;font-family:'Barlow',sans-serif;font-size:1.15rem;font-weight:900;letter-spacing:0.06em;cursor:pointer;margin-bottom:12px;transition:opacity .15s;box-shadow:0 4px 20px rgba(46,204,113,0.3)}
.btn-solucionado:active{opacity:0.85}
.btn-sec{width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);border-radius:10px;font-family:'Barlow',sans-serif;font-size:0.9rem;cursor:pointer;margin-bottom:8px}

/* ── Formularios inline ── */
.form-section{background:#1a2d42;border-radius:14px;padding:16px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.1)}
.form-section h3{font-size:0.78rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a227;font-weight:700;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:0.72rem;color:rgba(255,255,255,0.5);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;background:#0d1b2a;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 12px;color:#fff;font-family:'Barlow',sans-serif;font-size:0.95rem}
.field textarea{resize:none;height:80px}
.field select option{background:#1a2d42}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#c9a227}

/* ── Confirmación ── */
.confirm-box{background:rgba(46,204,113,0.1);border:2px solid rgba(46,204,113,0.4);border-radius:14px;padding:24px;text-align:center;display:none}
.confirm-box .cf-icon{font-size:2.5rem;margin-bottom:8px}
.confirm-box .cf-msg{font-size:1rem;font-weight:700;color:#2ecc71}
.confirm-box .cf-sub{font-size:0.82rem;color:rgba(255,255,255,0.5);margin-top:6px}

/* ── Spinner ── */
.spinner{text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-size:0.85rem}

/* ── Quien escaneo ── */
.quien-bar{background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px;font-size:0.78rem;color:rgba(255,255,255,0.4);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.quien-bar b{color:rgba(255,255,255,0.7)}
.quien-bar button{background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:0.75rem;font-family:'Barlow',sans-serif;text-decoration:underline}

/* ── Turno ── */
function getTurnoActual(){
  var h = new Date().getHours();
  if(h>=6&&h<14) return 'MAÑANA';
  if(h>=14) return 'TARDE';
  return 'NOCHE';
  var dom = new Date().getDay()===0;
  var nocheInicio = dom?21:22;
  if(h>=nocheInicio||h<6) return 'NOCHE';
}
function getFechaTurno(){
  var d = new Date(); var h = d.getHours();
  var umbral = d.getDay()===0?21:22;
  if(h>=umbral) d.setDate(d.getDate()+1);
  return d;
}
function fechaStr(d){
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');
}
function horaStr(){
  var d = new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var _MEC_FALLBACK = ['ALEX','RAFA','GREGORIO','JAVIER E','JAVIER H','RUBIEL','ALBERTO','JOSE'];

function getMecActual(){
  // 1. mecSesion activa
  try {
    var s = JSON.parse(localStorage.getItem('mecSesion')||'null');
    if(s && s.nombre && (s.expires===null||Date.now()<s.expires)) return s.nombre;
  } catch(e){}
  // 2. Sesión rápida guardada en sessionStorage
  var q = sessionStorage.getItem('quickMec');
  if(q) return q;
  return null;
}

function iniciarApp(){
  if(!maqId || !maq){
    document.getElementById('idScreen').style.display='none';
    document.getElementById('mainContent').style.display='block';
    document.getElementById('cuerpo').innerHTML='<div style="text-align:center;padding:40px;color:#e74c3c;font-size:1rem">⚠️ Máquina no encontrada.<br><br><a href="landing.html" style="color:#c9a227">← Volver al inicio</a></div>';
    return;
  }
  var m = getMecActual();
  if(m){
    mecActual = m;
    mostrarMain();
  } else {
    cargarListaMecanicos();
  }
}

function cargarListaMecanicos(){
  DB.ref('config/mecanicos').once('value')
    .then(function(snap){ var v=snap.val(); mostrarSelectorMec(v&&v.length?v:_MEC_FALLBACK); })
    .catch(function(){ mostrarSelectorMec(_MEC_FALLBACK); });
}

function mostrarSelectorMec(lista){
  var grid = document.getElementById('mecGrid');
  grid.innerHTML = lista.map(function(n){
    return '<button class="mec-btn" onclick="seleccionarMec(\''+escHtml(n)+'\')">'+escHtml(n)+'</button>';
  }).join('');
}

function seleccionarMec(nombre){
  mecActual = nombre;
  sessionStorage.setItem('quickMec', nombre);
  mostrarMain();
}

function cambiarMecanico(){
  sessionStorage.removeItem('quickMec');
  mecActual = '';
  document.getElementById('mainContent').style.display='none';
  document.getElementById('idScreen').style.display='flex';
  cargarListaMecanicos();
}

function mostrarMain(){
  document.getElementById('idScreen').style.display='none';
  document.getElementById('mainContent').style.display='block';
  document.getElementById('mecNomMostrar').textContent = mecActual;
  suscribirMaquina();
}

   ══════════════════════════════════════════════════ */
function suscribirMaquina(){
  // Escuchar averias abiertas de esta máquina
  DB.ref('averias').orderByChild('maqId').equalTo(maqId).on('value', function(snap){
    var todas = snap.val() ? Object.values(snap.val()) : [];
    averiaAbierta = todas.find(function(a){
      return a.estado === 'PENDIENTE' || a.estado === 'EN CURSO';
    }) || null;
    // También leer estado_maquinas para el chip
    DB.ref('estado_maquinas/'+maqId).once('value').then(function(s){
      renderMaquina(s.val());
    });
  });
}

var EST_CFG = {
  OPERATIVA:    {color:'#2ecc71',bg:'rgba(46,204,113,0.15)',icon:'🟢',label:'OPERATIVA'},
  AVERIA:       {color:'#e74c3c',bg:'rgba(231,76,60,0.15)',  icon:'🔴',label:'AVERÍA'},
  PARADA:       {color:'#f39c12',bg:'rgba(243,156,18,0.15)', icon:'🟡',label:'PARADA'},
  MANTENIMIENTO:{color:'#3498db',bg:'rgba(52,152,219,0.15)', icon:'🔵',label:'MANT. PREV.'}
};

function renderMaquina(estData){
  var est = (estData && estData.estado) || (averiaAbierta ? 'AVERIA' : 'OPERATIVA');
  var cfg = EST_CFG[est] || EST_CFG.OPERATIVA;
  var crit = maq.c === 'A' ? '🔴 CRÍTICA' : maq.c === 'B' ? '🟡 IMPORTANTE' : maq.c === 'C' ? '🟢 NORMAL' : '';

  var html = '';

  // Ficha máquina
  html += '<div class="maq-card">'
    + '<div class="maq-id">'+escHtml(maq.id)+'</div>'
    + '<div class="maq-nombre">'+escHtml(maq.n)+'</div>'
    + '<div class="maq-meta">'+escHtml(maq.t)+(maq.f?' · '+escHtml(maq.f):'')+' · '+escHtml(maq.a)+(crit?' · '+crit:'')+'</div>'
    + '<div class="estado-chip" style="color:'+cfg.color+';background:'+cfg.bg+';border-color:'+cfg.color+'60">'+cfg.icon+' '+cfg.label+'</div>'
    + '</div>';

  // Avería abierta
  if(averiaAbierta){
    var av = averiaAbierta;
    var ts = av.ts ? new Date(av.ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) : '';
    var fecha = av.fecha || '';
    var quien = (av.mecanicos||[]).join(', ') || '—';
    html += '<div class="averia-abierta">'
      + '<div class="av-titulo">🚨 AVERÍA ABIERTA</div>'
      + '<div class="av-info">'
      + '📅 ' + fecha + (ts?' a las '+ts:'') + '<br>'
      + '👷 Reportada por: <b>'+escHtml(quien)+'</b><br>'
      + '🔄 Turno: <b>'+(av.turno||'—')+'</b>'
      + '</div>'
      + (av.descripcion?'<div class="av-desc">«'+escHtml(av.descripcion)+'»</div>':'')
      + '</div>';

    // Botón solucionado
    html += '<button class="btn-solucionado" onclick="mostrarFormSolucion()">✅ MARCAR COMO RESUELTA</button>';
    html += '<button class="btn-sec" onclick="verEnHistorial()">📋 Ver en historial completo</button>';

    // Form solución (oculto)
    var partes = PARTES[maq.t] || ['MECANICO','ELECTRICO','CUADRO','AJUSTE','OTROS'];
    html += '<div class="form-section" id="formSolucion" style="display:none">'
      + '<h3>✅ Datos de la reparación</h3>'
      + '<div class="field"><label>Tipo de avería</label>'
      + '<select id="fTipo"><option value="MECANICA">MECANICA</option><option value="ELECTRICA">ELECTRICA</option><option value="NEUMATICA">NEUMATICA</option><option value="HIDRAULICA">HIDRAULICA</option><option value="FRIO">FRIO</option><option value="OTROS">OTROS</option></select></div>'
      + '<div class="field"><label>Parte afectada</label>'
      + '<select id="fParte"><option value="">— Selecciona —</option>'
      + partes.map(function(p){ return '<option>'+escHtml(p)+'</option>'; }).join('')
      + '</select></div>'
      + '<div class="field"><label>Descripción de la reparación</label>'
      + '<textarea id="fDesc" placeholder="¿Qué se ha hecho?"></textarea></div>'
      + '<div class="field"><label>Hora fin (auto)</label>'
      + '<input type="time" id="fHoraFin" value="'+horaStr()+'"></div>'
      + '<button class="btn-solucionado" onclick="confirmarSolucion()">✅ CONFIRMAR Y CERRAR AVERÍA</button>'
      + '<button class="btn-sec" onclick="document.getElementById(\'formSolucion\').style.display=\'none\'">Cancelar</button>'
      + '</div>';

  } else {
    // Sin avería — un solo toque, registro inmediato
    html += '<button class="btn-averia" onclick="this.disabled=true;this.textContent=\'⏳ Registrando...\';confirmarAveria()">🔴 DECLARAR AVERÍA</button>';
    html += '<button class="btn-sec" onclick="verEnHistorial()">📋 Ver historial de esta máquina</button>';
  }

  // Confirmación (oculta)
  html += '<div class="confirm-box" id="confirmBox">'
    + '<div class="cf-icon" id="cfIcon">✅</div>'
    + '<div class="cf-msg" id="cfMsg"></div>'
    + '<div class="cf-sub" id="cfSub"></div>'
    + '</div>';

  document.getElementById('cuerpo').innerHTML = html;
}

function mostrarFormSolucion(){
  var f = document.getElementById('formSolucion');
  if(f){ f.style.display='block'; f.scrollIntoView({behavior:'smooth',block:'start'}); }
}

function confirmarAveria(){
  var desc = '';
  var horaIni = horaStr();
  var d = getFechaTurno();
  var av = {
    id: 'AVR-'+Date.now(),
    ts: Date.now(),
    fecha: fechaStr(d),
    horaInicio: horaIni,
    horaFin: '',
    tiempoMin: 0,
    maqId: maq.id,
    maqNombre: maq.n,
    maqTipo: maq.t,
    maqFabricante: maq.f||'',
    maqArea: maq.a,
    criticidad: maq.c||'',
    parte: '',
    tipo: '',
    gravedad: '',
    causa: '',
    turno: getTurnoActual(),
    mecanicos: [mecActual],
    descripcion: desc.trim(),
    accion: '',
    observaciones: '',
    materiales: [],
    costeMateriales: 0,
    firma: null,
    foto: null,
    firmada: false,
    firmadaPor: null,
    firmadaFecha: null,
    estado: 'PENDIENTE'
  };

  // Guardar en Firebase
  DB.ref('averias/'+av.id).set(av);
  DB.ref('estado_maquinas/'+maq.id).set({estado:'AVERIA', ts:Date.now(), nota:''});
  try {
    var avs = JSON.parse(localStorage.getItem('averias_v1')||'[]');
    avs.unshift(av);
    localStorage.setItem('averias_v1', JSON.stringify(avs));
  } catch(e){}

  mostrarConfirmacion('🔴','AVERÍA REGISTRADA','Notificado. Añade los detalles desde el parte cuando puedas.', true);
}

function confirmarSolucion(){
  if(!averiaAbierta){ return; }
  var tipo = (document.getElementById('fTipo')||{}).value || '';
  var parte = (document.getElementById('fParte')||{}).value || '';
  var desc = (document.getElementById('fDesc')||{}).value || '';
  var horaFin = (document.getElementById('fHoraFin')||{}).value || horaStr();

  var av = Object.assign({}, averiaAbierta);
  av.estado = 'RESUELTA';
  av.tipo = tipo || av.tipo;
  av.parte = parte || av.parte;
  av.accion = desc;
  av.horaFin = horaFin;
  av.tsActualizado = Date.now();

  // Calcular tiempo
  if(av.horaInicio && horaFin){
    var ini = av.horaInicio.split(':').map(Number);
    var fin = horaFin.split(':').map(Number);
    var t = (fin[0]*60+fin[1])-(ini[0]*60+ini[1]);
    if(t<0) t+=24*60;
    av.tiempoMin = t;
  }
  // Si no tenía mecánico, añadir el actual
  if(!av.mecanicos||!av.mecanicos.length) av.mecanicos = [mecActual];
  else if(av.mecanicos.indexOf(mecActual)===-1) av.mecanicos.push(mecActual);

  DB.ref('averias/'+av.id).set(av);
  DB.ref('estado_maquinas/'+maq.id).set({estado:'OPERATIVA', ts:Date.now(), nota:''});
  try {
    var avs = JSON.parse(localStorage.getItem('averias_v1')||'[]');
    var idx = avs.findIndex(function(x){ return x.id===av.id; });
    if(idx!==-1) avs[idx]=av; else avs.unshift(av);
    localStorage.setItem('averias_v1', JSON.stringify(avs));
  } catch(e){}

  mostrarConfirmacion('✅','AVERÍA CERRADA','Gracias '+(mecActual||'')+'. La reparación ha sido registrada.');
}

function mostrarConfirmacion(icon, msg, sub, conEnlaceParte){
  var b = document.getElementById('confirmBox');
  if(!b) return;
  document.getElementById('cfIcon').textContent = icon;
  document.getElementById('cfMsg').textContent = msg;
  var subEl = document.getElementById('cfSub');
  subEl.textContent = sub;
  if(conEnlaceParte){
    subEl.innerHTML = sub + '<br><br><a href="averias.html" style="color:#c9a227;font-weight:700">📋 Abrir historial para añadir detalles →</a>';
  }
  b.style.display = 'block';
  b.scrollIntoView({behavior:'smooth',block:'center'});
  ['formAveria','formSolucion'].forEach(function(id){
    var el=document.getElementById(id); if(el) el.style.display='none';
  });
  var btnAv = document.querySelector('.btn-averia');
  var btnSol = document.querySelector('.btn-solucionado:not(#formSolucion .btn-solucionado)');
  if(btnAv) btnAv.style.display='none';
  document.querySelectorAll('.btn-solucionado').forEach(function(b){ b.style.display='none'; });
}

function verEnHistorial(){
  window.location.href = 'averias.html';
}

   ARRANQUE

iniciarApp();
