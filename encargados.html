<style>
:root{
  --navy:#0d1b2a;--navy-mid:#1a2d42;--navy-light:#243d56;
  --gold:#c9a227;--gold-light:#f0c040;--white:#f0f4f8;
  --red:#e74c3c;--green:#2ecc71;--purple:#9b59b6;--purple-light:#c39bd3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,#0a1520,var(--navy-mid));border-bottom:2px solid var(--purple);
  padding:14px 20px;display:flex;align-items:center;gap:14px}
.topbar h1{font-size:1.3rem;font-weight:900;letter-spacing:0.06em;color:var(--purple-light)}
.back-btn{background:rgba(155,89,182,0.15);border:1px solid rgba(155,89,182,0.4);color:var(--purple-light);
  padding:8px 14px;border-radius:7px;text-decoration:none;font-family:'Barlow',sans-serif;
  font-size:0.85rem;letter-spacing:0.06em}

/* CONTENIDO */
.wrap{max-width:540px;margin:0 auto;padding:20px 16px}

/* SELECTOR ENCARGADO */
.enc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.enc-btn{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.12);
  border-radius:12px;padding:16px 8px;text-align:center;cursor:pointer;
  font-family:'Barlow',sans-serif;font-size:0.95rem;font-weight:700;letter-spacing:0.06em;
  color:rgba(255,255,255,0.7);transition:all .2s;-webkit-tap-highlight-color:transparent}
.enc-btn:hover{background:rgba(155,89,182,0.15);border-color:rgba(155,89,182,0.5)}
.enc-btn.sel{background:rgba(155,89,182,0.2);border-color:var(--purple);color:var(--purple-light)}

/* FORMULARIO */
.form-wrap{display:none}
.who-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(155,89,182,0.15);
  border:1px solid rgba(155,89,182,0.35);border-radius:20px;padding:6px 14px;
  font-size:0.85rem;font-weight:700;color:var(--purple-light);margin-bottom:20px;cursor:pointer}
.section-title{font-size:0.68rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;margin-top:20px;padding-bottom:5px;
  border-bottom:1px solid rgba(201,162,39,0.2)}
.field{margin-bottom:14px}
.field label{display:block;font-size:0.72rem;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.45);margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
  border-radius:8px;padding:11px 14px;color:var(--white);
  font-family:'Barlow',sans-serif;font-size:0.95rem}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--purple)}
.field select option{background:var(--navy-mid)}
.field select optgroup{background:var(--navy-mid);color:var(--gold)}
.field textarea{resize:vertical;min-height:80px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.toggle-row{display:flex;align-items:center;gap:14px;padding:12px 14px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;margin-bottom:14px;cursor:pointer}
.toggle-lbl{flex:1;font-size:0.9rem;color:rgba(255,255,255,0.75)}
.toggle{width:44px;height:24px;background:rgba(255,255,255,0.15);border-radius:12px;
  position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--purple)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;
  background:#fff;border-radius:50%;transition:left .2s}
.toggle.on::after{left:23px}
.tiempo-wrap{display:none;margin-bottom:14px}
.btn-guardar{width:100%;padding:15px;background:linear-gradient(135deg,var(--purple),#6c3483);
  color:#fff;border:none;border-radius:10px;font-family:'Barlow',sans-serif;
  font-size:1rem;font-weight:900;letter-spacing:0.08em;cursor:pointer;margin-top:8px;
  transition:all .2s}
.btn-guardar:hover{filter:brightness(1.1)}
.btn-guardar:disabled{opacity:0.5;cursor:not-allowed}

/* CONFIRMACIÓN */
.confirm-wrap{display:none;text-align:center;padding:40px 20px}
.confirm-ico{font-size:3.5rem;margin-bottom:14px}
.confirm-title{font-size:1.3rem;font-weight:900;color:var(--green);margin-bottom:8px}
.confirm-sub{font-size:0.85rem;color:rgba(255,255,255,0.5);margin-bottom:28px}
.btn-otro{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:var(--white);padding:11px 28px;border-radius:8px;cursor:pointer;
  font-family:'Barlow',sans-serif;font-size:0.9rem;font-weight:700}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(20,35,50,0.97);border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;padding:11px 22px;font-size:0.88rem;opacity:0;
  transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

  <h1>👷 Encargados</h1>
</div>

<div class="wrap">

  <!-- PASO 1: Seleccionar encargado -->
  <div id="stepEnc">
    <div class="section-title" style="margin-top:4px">¿Quién eres?</div>
    <div class="enc-grid">
      <button class="enc-btn" onclick="selEnc('IVAN')">IVAN</button>
      <button class="enc-btn" onclick="selEnc('LUISMI')">LUISMI</button>
      <button class="enc-btn" onclick="selEnc('SERGIO')">SERGIO</button>
      <button class="enc-btn" onclick="selEnc('PINILLA')">PINILLA</button>
      <button class="enc-btn" onclick="selEnc('MAGER')">MAGER</button>
      <button class="enc-btn" onclick="selEnc('COSTI')">COSTI</button>
    </div>
  </div>

  <!-- PASO 2: Formulario aviso -->
  <div class="form-wrap" id="formWrap">
    <div class="who-badge" id="whoBadge" onclick="cambiarEnc()">
      <span id="whoName"></span>
      <span style="font-size:0.7rem;opacity:0.6">✎ cambiar</span>
    </div>

    <div class="section-title" style="margin-top:0">Máquina</div>
    <div class="field">
      <label>Selecciona la máquina</label>
      <select id="fMaq">
        <option value="">— Selecciona —</option>
      </select>
    </div>

    <div class="section-title">Avería</div>
    <div class="field">
      <label>Descripción de la avería *</label>
      <textarea id="fDesc" placeholder="Describe brevemente qué ha pasado..."></textarea>
    </div>

    <div class="section-title">Fecha y hora</div>
    <div class="row2">
      <div class="field">
        <label>Fecha</label>
        <input type="date" id="fFecha">
      </div>
      <div class="field">
        <label>Hora</label>
        <input type="time" id="fHora">
      </div>
    </div>

    <div class="section-title">Parada de máquina</div>
    <div class="toggle-row" onclick="toggleParada()">
      <span class="toggle-lbl">¿Ha estado la máquina parada?</span>
      <div class="toggle" id="togParada"></div>
    </div>
    <div class="tiempo-wrap" id="tiempoWrap">
      <div class="field">
        <label>Tiempo parada (minutos)</label>
        <input type="number" id="fTiempo" min="0" placeholder="Ej: 30">
      </div>
    </div>

    <button class="btn-guardar" id="btnGuardar" onclick="guardarAviso()">📢 ENVIAR AVISO</button>
  </div>

  <!-- PASO 3: Confirmación -->
  <div class="confirm-wrap" id="confirmWrap">
    <div class="confirm-ico">✅</div>
    <div class="confirm-title">Aviso enviado</div>
    <div class="confirm-sub">El mecánico ha sido avisado.<br>Puedes cerrar esta página.</div>
    <button class="btn-otro" onclick="nuevoAviso()">➕ Enviar otro aviso</button>
  </div>

</div>

<div class="toast" id="toast"></div>

var MAQUINAS_ENC = MAQUINAS_BASE.slice(); // empieza con la lista base
DB.ref('maquinas_extra').once('value').then(function(snap){
  var extra = snap.val();
  if(extra){
    var ids = MAQUINAS_ENC.map(function(m){ return m.id; });
    Object.values(extra).forEach(function(m){
      if(ids.indexOf(m.id) === -1) MAQUINAS_ENC.push(m);
    });
  }
  poblarMaquinas();
}).catch(function(){ poblarMaquinas(); });

function poblarMaquinas(){
  var sel = document.getElementById('fMaq');
  // Agrupar por área
  var areas = {};
  MAQUINAS_ENC.forEach(function(m){
    var a = m.a || 'OTRAS';
    if(!areas[a]) areas[a] = [];
    areas[a].push(m);
  });
  sel.innerHTML = '<option value="">— Selecciona —</option>';
  Object.keys(areas).sort().forEach(function(area){
    var grp = document.createElement('optgroup');
    grp.label = area;
    areas[area].sort(function(a,b){ return (a.n||'').localeCompare(b.n||''); }).forEach(function(m){
      var o = document.createElement('option');
      o.value = m.n || m.id;
      o.textContent = m.n || m.id;
      grp.appendChild(o);
    });
    sel.appendChild(grp);
  });
}

// ── Seleccionar encargado ──────────────────────────
function selEnc(nombre){
  encActual = nombre;
  document.querySelectorAll('.enc-btn').forEach(function(b){
    b.classList.toggle('sel', b.textContent === nombre);
  });
  document.getElementById('whoName').textContent = '👷 ' + nombre;
  document.getElementById('stepEnc').style.display   = 'none';
  document.getElementById('formWrap').style.display  = 'block';
  document.getElementById('confirmWrap').style.display = 'none';

  // Fecha y hora actuales como default
  var ahora = new Date();
  document.getElementById('fFecha').value = ahora.toISOString().substring(0,10);
  document.getElementById('fHora').value  =
    ahora.getHours().toString().padStart(2,'0') + ':' + ahora.getMinutes().toString().padStart(2,'0');
}

function cambiarEnc(){
  document.getElementById('stepEnc').style.display  = 'block';
  document.getElementById('formWrap').style.display = 'none';
  document.querySelectorAll('.enc-btn').forEach(function(b){ b.classList.remove('sel'); });
}

// ── Toggle parada ──────────────────────────────────
function toggleParada(){
  paradaOn = !paradaOn;
  document.getElementById('togParada').classList.toggle('on', paradaOn);
  document.getElementById('tiempoWrap').style.display = paradaOn ? 'block' : 'none';
  if(!paradaOn) document.getElementById('fTiempo').value = '';
}

// ── Guardar aviso ──────────────────────────────────
function guardarAviso(){
  var maq   = document.getElementById('fMaq').value.trim();
  var desc  = document.getElementById('fDesc').value.trim();
  var fecha = document.getElementById('fFecha').value;
  var hora  = document.getElementById('fHora').value;

  if(!maq)  { showToast('⚠️ Selecciona la máquina');    return; }
  if(!desc) { showToast('⚠️ Escribe una descripción');  return; }
  if(!fecha){ showToast('⚠️ Indica la fecha');          return; }
  if(!hora) { showToast('⚠️ Indica la hora');           return; }

  var tiempoMin = paradaOn ? (parseInt(document.getElementById('fTiempo').value)||0) : 0;

  var aviso = {
    id:         'ENC-' + Date.now(),
    ts:         Date.now(),
    encargado:  encActual,
    maquina:    maq,
    descripcion:desc,
    fecha:      fecha,
    hora:       hora,
    parada:     paradaOn,
    tiempoMin:  tiempoMin,
    visto:      false
  };

  var btn = document.getElementById('btnGuardar');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  DB.ref('avisos_encargados/' + aviso.id).set(aviso).then(function(){
    document.getElementById('formWrap').style.display    = 'none';
    document.getElementById('confirmWrap').style.display = 'block';
    limpiarForm();
  }).catch(function(){
    showToast('❌ Error al enviar. Comprueba la conexión.');
    btn.disabled = false;
    btn.textContent = '📢 ENVIAR AVISO';
  });
}

function limpiarForm(){
  document.getElementById('fMaq').value   = '';
  document.getElementById('fDesc').value  = '';
  document.getElementById('fTiempo').value = '';
  paradaOn = false;
  document.getElementById('togParada').classList.remove('on');
  document.getElementById('tiempoWrap').style.display = 'none';
  var btn = document.getElementById('btnGuardar');
  btn.disabled = false;
  btn.textContent = '📢 ENVIAR AVISO';
}

function nuevoAviso(){
  document.getElementById('confirmWrap').style.display = 'none';
  document.getElementById('formWrap').style.display    = 'block';
  var ahora = new Date();
  document.getElementById('fFecha').value = ahora.toISOString().substring(0,10);
  document.getElementById('fHora').value  =
    ahora.getHours().toString().padStart(2,'0') + ':' + ahora.getMinutes().toString().padStart(2,'0');
}

// ── Toast ──────────────────────────────────────────
var _toastTimer;
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
</script>
</body>
</html>
