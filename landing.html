<style>
:root{
  --navy:#0d1b2a; --navy-mid:#1a2d42; --navy-light:#243d56;
  --gold:#c9a227; --gold-light:#f0c040;
  --white:#f0f4f8; --red:#e74c3c; --green:#2ecc71;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif}

/* ── PANTALLAS ── */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;gap:0;
  transition:opacity .3s,transform .3s;
}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(16px)}

/* ── BANNER MÁQUINA ── */
.maq-banner{
  width:100%;max-width:360px;
  background:linear-gradient(135deg,rgba(201,162,39,0.18),rgba(201,162,39,0.06));
  border:1px solid rgba(201,162,39,0.4);
  border-radius:14px;padding:16px 20px;
  text-align:center;margin-bottom:24px;
}
.maq-banner .maq-id{font-size:0.72rem;letter-spacing:.2em;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:4px}
.maq-banner .maq-name{font-size:1.25rem;font-weight:900;color:var(--gold-light);letter-spacing:.04em}
.maq-banner .maq-sub{font-size:0.8rem;color:rgba(255,255,255,0.4);margin-top:3px}

/* ── CAJA LOGIN ── */
.box{
  background:var(--navy-mid);
  border:1px solid rgba(201,162,39,0.3);
  border-radius:18px;padding:32px 24px;
  width:100%;max-width:360px;
  text-align:center;
}
.box .ico{font-size:2.8rem;margin-bottom:10px}
.box h2{font-size:1.3rem;font-weight:900;color:var(--gold-light);margin-bottom:4px}
.box .sub{font-size:0.72rem;color:rgba(255,255,255,0.35);letter-spacing:.14em;text-transform:uppercase;margin-bottom:26px}
.box input{
  width:100%;background:var(--navy);color:var(--white);
  border:1px solid rgba(255,255,255,0.2);border-radius:9px;
  padding:14px;font-family:'Barlow',sans-serif;font-size:1.1rem;
  text-align:center;letter-spacing:.2em;margin-bottom:14px;
}
.box input:focus{outline:none;border-color:var(--gold)}
.btn-gold{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--gold),#a07d1a);
  color:#0d1b2a;border:none;border-radius:9px;
  font-family:'Barlow',sans-serif;font-size:1rem;font-weight:900;
  letter-spacing:.1em;cursor:pointer;transition:opacity .2s;
}
.btn-gold:active{opacity:.8}
.err{color:var(--red);font-size:.85rem;margin-top:8px;min-height:20px}

/* ── SELECTOR MECÁNICO ── */
.mec-list{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.mec-list h2{font-size:1.1rem;font-weight:900;color:var(--gold-light);text-align:center;margin-bottom:6px}
.mec-btn{
  width:100%;padding:16px 18px;
  background:var(--navy-mid);border:2px solid rgba(255,255,255,0.1);
  border-radius:12px;color:var(--white);
  font-family:'Barlow',sans-serif;font-size:1.05rem;font-weight:700;
  cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;
  transition:all .15s;
}
.mec-btn:active,.mec-btn:hover{background:rgba(201,162,39,0.15);border-color:var(--gold)}

/* ── ELECCIÓN ── */
.choice-wrap{width:100%;max-width:360px}
.choice-wrap h2{font-size:1.15rem;font-weight:900;color:var(--gold-light);text-align:center;margin-bottom:6px}
.choice-wrap .who{font-size:0.85rem;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:22px}
.choice-btn{
  width:100%;padding:22px 20px;border-radius:14px;
  border:none;font-family:'Barlow',sans-serif;cursor:pointer;
  display:flex;align-items:center;gap:16px;margin-bottom:14px;
  transition:transform .15s,box-shadow .15s;
}
.choice-btn:active{transform:scale(.97)}
.choice-btn .ch-ico{font-size:2.4rem;flex-shrink:0}
.choice-btn .ch-body{text-align:left}
.choice-btn .ch-title{font-size:1.1rem;font-weight:900;letter-spacing:.04em}
.choice-btn .ch-sub{font-size:0.8rem;opacity:.75;margin-top:3px}

.btn-averia{
  background:linear-gradient(135deg,rgba(231,76,60,0.25),rgba(192,57,43,0.15));
  border:2px solid rgba(231,76,60,0.5);color:var(--white);
  box-shadow:0 4px 20px rgba(231,76,60,0.15);
}
.btn-averia:hover{box-shadow:0 6px 28px rgba(231,76,60,0.3)}
.btn-tareas{
  background:linear-gradient(135deg,rgba(46,204,113,0.2),rgba(39,174,96,0.12));
  border:2px solid rgba(46,204,113,0.45);color:var(--white);
  box-shadow:0 4px 20px rgba(46,204,113,0.12);
}
.btn-tareas:hover{box-shadow:0 6px 28px rgba(46,204,113,0.25)}

.btn-back{
  width:100%;padding:10px;margin-top:4px;
  background:transparent;border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;color:rgba(255,255,255,0.4);
  font-family:'Barlow',sans-serif;font-size:.85rem;cursor:pointer;
}
.btn-back:active{background:rgba(255,255,255,0.05)}

.btn-docs{
  background:linear-gradient(135deg,rgba(52,152,219,0.2),rgba(41,128,185,0.12));
  border:2px solid rgba(52,152,219,0.45);color:var(--white);
  box-shadow:0 4px 20px rgba(52,152,219,0.12);
}
.btn-docs:hover{box-shadow:0 6px 28px rgba(52,152,219,0.25)}

.doc-card{
  background:var(--navy-mid);border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  text-decoration:none;color:var(--white);
  transition:border-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.doc-card:active{background:rgba(201,162,39,0.1);border-color:var(--gold)}

    </select>
    <input type="password" id="pwInput" placeholder="Contraseña" autocomplete="off"
           onkeydown="if(event.key==='Enter') doLogin()">
    <label style="display:flex;align-items:center;gap:10px;margin:10px 0 14px;cursor:pointer;justify-content:center;font-size:0.85rem;color:rgba(255,255,255,0.6)">

    </label>
    <button class="btn-gold" onclick="doLogin()">ENTRAR</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ══ PANTALLA 3: ELECCIÓN ══ -->
<div class="screen hidden" id="screenChoice">
  <div class="choice-wrap">
    <h2>¿Qué quieres hacer?</h2>
    <div class="who" id="choiceWho"></div>

    <button class="choice-btn btn-averia" onclick="irA('averia')">
      <div class="ch-ico">🔴</div>
      <div class="ch-body">
        <div class="ch-title">Reportar Avería</div>
        <div class="ch-sub">Registrar un fallo o incidencia en la máquina</div>
      </div>
    </button>

    <button class="choice-btn btn-tareas" onclick="irA('tareas')">
      <div class="ch-ico">✅</div>
      <div class="ch-body">
        <div class="ch-title">Mis Tareas</div>
        <div class="ch-sub">Ver y marcar el plan de mantenimiento preventivo</div>
      </div>
    </button>

    <button class="choice-btn btn-docs" onclick="irA('docs')">
      <div class="ch-ico">📄</div>
      <div class="ch-body">
        <div class="ch-title">Documentos</div>
        <div class="ch-sub">Manuales, esquemas y fichas técnicas</div>
      </div>
    </button>

    <button class="choice-btn" style="background:linear-gradient(135deg,rgba(155,89,182,0.2),rgba(142,68,173,0.12));border:2px solid rgba(155,89,182,0.45);color:var(--white);box-shadow:0 4px 20px rgba(155,89,182,0.12)" onclick="irA('historial')">

      <div class="ch-body">
        <div class="ch-title">Historial</div>
        <div class="ch-sub">Averías y mantenimientos de esta máquina</div>
      </div>
    </button>

    <button class="btn-back" onclick="cambiarMecanico()">← Cambiar mecánico</button>
  </div>
</div>


<!-- ══ PANTALLA 4: DOCUMENTOS ══ -->
<div class="screen hidden" id="screenDocs">

/* ── ESTADO ── */
var MEC_SESION_KEY = 'mecSesion';
var mecActual      = null;
var maqActual      = null;

/* ── SESION ── */
function _mecSesionValida(){
  try {
    var s = JSON.parse(localStorage.getItem(MEC_SESION_KEY) || 'null');
    if(!s || !s.nombre) return false;
    if(s.expires !== null && Date.now() > s.expires){ localStorage.removeItem(MEC_SESION_KEY); return false; }
    return s.nombre;
  } catch(e){ return false; }
}

/* ── ARRANQUE ── */
(function init(){
  var params = new URLSearchParams(window.location.search);
  var maqId  = params.get('maq');
  if(maqId){
    maqActual = MAQUINAS.find(function(m){ return m.id === maqId; }) || {id:maqId, n:maqId, t:'', a:''};
    mostrarBanner('maqBanner', 'maqId', 'maqName', null);
  }
  // Si ya hay sesion valida, saltar directamente a la eleccion
  var nombre = _mecSesionValida();
  if(nombre){
    mecActual = nombre;
    mostrarChoice();
  }
})();

// Cargar máquinas extra de Firebase
DB.ref('maquinas_extra').once('value').then(function(snap){
  var val = snap.val();
  if(!val) return;
  Object.values(val).forEach(function(m){
    if(!MAQUINAS.find(function(x){ return x.id === m.id; })){
      MAQUINAS.push({id: m.id, n: m.n, t: m.t||'', a: m.a||''});
    }
  });
  if(maqActual && maqActual.n === maqActual.id){
    var encontrada = MAQUINAS.find(function(m){ return m.id === maqActual.id; });
    if(encontrada){ maqActual = encontrada; mostrarBanner('maqBanner', 'maqId', 'maqName', null); }
  }
}).catch(function(){});

// Cargar lista de mecanicos en el selector del login
(function cargarMecListLogin(){
  var sel = document.getElementById('mecNombreSel');
  if(!sel) return;
  var fb = ['ALEX','RAFA','GREGORIO','JAVIER E','JAVIER H','RUBIEL','ALBERTO'];
  function poblar(lista){ lista.forEach(function(n){ var o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); }); }
  DB.ref('config/mecanicos').once('value')
    .then(function(s){ var v=s.val(); poblar(v&&v.length?v:fb); })
    .catch(function(){ poblar(fb); });
})();

function mostrarBanner(bannerId, idEl, nameEl, subEl){
  if(!maqActual) return;
  var b = document.getElementById(bannerId);
  b.style.display = 'block';
  document.getElementById(idEl).textContent   = maqActual.id;
  document.getElementById(nameEl).textContent = maqActual.n;
  if(subEl) document.getElementById(subEl).textContent = maqActual.t + (maqActual.a ? ' · '+maqActual.a : '');
}

/* ── PANTALLAS ── */
function mostrar(id){
  ['screenLogin','screenChoice','screenDocs'].forEach(function(s){
    var el = document.getElementById(s);
    if(el) el.classList.toggle('hidden', s !== id);
  });
}

function mostrarChoice(){
  document.getElementById('choiceWho').textContent = maqActual ? '\u{1F3ED} ' + maqActual.n : '';
  var bar  = document.getElementById('mecTopBar');
  var name = document.getElementById('mecTopBarName');
  var maq  = document.getElementById('mecTopBarMaq');
  if(bar)  bar.style.display  = 'block';
  if(name) name.textContent   = mecActual;
  if(maq)  maq.textContent    = maqActual ? maqActual.n : '';
  // Dar espacio para la barra fija
  ['screenChoice','screenDocs'].forEach(function(s){
    var el = document.getElementById(s);
    if(el) el.style.paddingTop = '50px';
  });
  mostrar('screenChoice');
}

/* ── LOGIN ── */
function doLogin(){
  var nombre  = document.getElementById('mecNombreSel').value;
  var pw      = document.getElementById('pwInput').value;
  var err     = document.getElementById('loginErr');
  var esMiTel = document.getElementById('mecMiTel').checked;
  err.textContent = '';
  if(!nombre){ err.textContent = '⚠️ Selecciona tu nombre'; return; }
  if(!pw)    { err.textContent = '⚠️ Introduce la contrasena'; return; }
  err.textContent = 'Verificando...';
  DB.ref('config/mecanicos_pwd').once('value').then(function(snap){
    var pwsObj = snap.val() || {};
    var pwEsperada = pwsObj[nombre] || null;
    if(!pwEsperada){ err.textContent = '❌ Sin contrasena asignada. Contacta con el responsable.'; return; }
    if(pw !== pwEsperada){
      err.textContent = '❌ Contrasena incorrecta';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
      return;
    }
    DB.ref('config/mecSessionHoras').once('value').then(function(snap2){
      var horas = snap2.val() || 8;
      var expires = esMiTel ? null : (Date.now() + horas * 3600 * 1000);
      localStorage.setItem(MEC_SESION_KEY, JSON.stringify({nombre:nombre, expires:expires}));
      mecActual = nombre;
      mostrarChoice();
    }).catch(function(){
      var expires = esMiTel ? null : (Date.now() + 8 * 3600 * 1000);
      localStorage.setItem(MEC_SESION_KEY, JSON.stringify({nombre:nombre, expires:expires}));
      mecActual = nombre;
      mostrarChoice();
    });
  }).catch(function(){ err.textContent = '❌ Error de conexion. Intentalo de nuevo.'; });
}

function cambiarMecanico(){
  localStorage.removeItem(MEC_SESION_KEY);
  mecActual = null;
  document.getElementById('loginErr').textContent = '';
  document.getElementById('pwInput').value = '';
  var bar = document.getElementById('mecTopBar');
  if(bar) bar.style.display = 'none';
  mostrar('screenLogin');
}

/* ── DESTINO ── */
function irA(destino){
  if(destino === 'docs'){ verDocs(); return; }
  if(!mecActual) return;
  // mecSesion ya esta guardado en localStorage — las paginas destino lo leen
  if(destino === 'averia'){
    var url = 'averias.html';
    if(maqActual) url += '?maq=' + encodeURIComponent(maqActual.id);
    window.location.href = url;
  } else if(destino === 'historial'){
    var url2 = 'historial_maquina.html';
    if(maqActual) url2 += '?maq=' + encodeURIComponent(maqActual.id);
    window.location.href = url2;
  } else {
    window.location.href = 'mis_tareas.html';
  }
}

function volverAChoice(){
  mostrar('screenChoice');
  var bar = document.getElementById('mecTopBar');
  if(bar) bar.style.display = 'block';
}

function verDocs(){
  var screens = ['screenLogin','screenMec','screenChoice','screenDocs'];

  function mostrarConDocs(id){
    screens.forEach(function(s){
      var el = document.getElementById(s);
      if(el) el.classList.toggle('hidden', s !== id);
    });
  }

  var title    = document.getElementById('docsTitle');
  var subtitle = document.getElementById('docsSubtitle');
  var lista    = document.getElementById('docsList');

  if(!maqActual){
    if(title) title.textContent = 'Documentos';
    if(subtitle) subtitle.textContent = 'Sin máquina seleccionada';
    if(lista) lista.innerHTML = '<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.35)">⚠️ Escanea el QR de una máquina para ver sus documentos.</div>';
    mostrarConDocs('screenDocs');
    return;
  }

  if(title) title.textContent = maqActual.n;
  if(subtitle) subtitle.textContent = maqActual.id + ' · ' + maqActual.t;
  if(lista) lista.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3)">Cargando...</div>';

  mostrarConDocs('screenDocs');

  DB.ref('maquinas/' + maqActual.id + '/docs').once('value').then(function(snap){
    var val = snap.val();
    if(!val || !Object.keys(val).length){
      lista.innerHTML = '<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.3)">Sin documentos disponibles para esta máquina.</div>';
      return;
    }

    var docs = Object.values(val).sort(function(a,b){
      return (b.fecha||'') > (a.fecha||'') ? 1 : -1;
    });

    lista.innerHTML = docs.map(function(d){
      var ext  = (d.nombre||'').split('.').pop().toUpperCase();
      var icon = ext==='PDF' ? '📕' : ext==='XLS'||ext==='XLSX' ? '📗' :
                 ext==='DOC'||ext==='DOCX' ? '📘' : '📎';
      var size = d.size>1048576 ? (d.size/1048576).toFixed(1)+' MB' : Math.round((d.size||0)/1024)+' KB';
      return '<a class="doc-card" href="' + d.url + '" target="_blank">' +
        '<span style="font-size:2rem;flex-shrink:0">' + icon + '</span>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="font-size:0.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (d.nombre||'') + '</div>' +
          '<div style="font-size:0.72rem;color:rgba(255,255,255,0.4);margin-top:3px">' + size + ' · ' + (d.fecha||'') + '</div>' +
        '</div>' +
        '<span style="font-size:1.3rem;color:var(--gold-light)">›</span>' +
      '</a>';
    }).join('');
  }).catch(function(){
    lista.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3)">Error al cargar documentos.</div>';
  });
}
