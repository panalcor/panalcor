<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mis Tareas — PANALCOR</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a1628; --surface:#0f2035; --surface2:#142840;
  --gold:#e8c14e; --cream:#f0f4f8; --text-dim:rgba(255,255,255,0.4);
  --green:#00b894; --red:#e74c3c; --blue:#74b9ff; --purple:#a29bfe;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--cream); font-family:Barlow,sans-serif; min-height:100vh; }

header {
  background:linear-gradient(135deg,#0d2137 0%,#162d45 100%);
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding:14px 20px;
  display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
}
.header-logo { font-family:Oswald,sans-serif; font-size:1.1rem; font-weight:700; color:var(--gold); letter-spacing:0.05em; }
.header-sub  { font-size:0.72rem; color:var(--text-dim); margin-top:1px; }
.header-mec  { font-size:0.88rem; font-weight:600; color:var(--blue); }

.mes-nav {
  display:flex; align-items:center; gap:10px;
  background:var(--surface2); border:1px solid rgba(255,255,255,0.08);
  border-radius:10px; padding:10px 16px; margin:14px 14px 6px; flex-wrap:wrap;
}
.mes-nav button {
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15);
  color:var(--cream); border-radius:6px; padding:6px 14px;
  font-family:Barlow,sans-serif; font-size:0.85rem; cursor:pointer;
}
.mes-nav button:hover { background:rgba(255,255,255,0.1); }
.mes-title { font-family:Oswald,sans-serif; font-size:1.05rem; font-weight:600; color:var(--gold); flex:1; text-align:center; }

.content { padding:0 14px 40px; }

.section-label {
  font-size:0.65rem; letter-spacing:0.14em; color:var(--text-dim);
  text-transform:uppercase; margin:14px 0 7px; font-weight:600;
}

.task-card {
  background:var(--surface); border:1px solid rgba(255,255,255,0.08);
  border-radius:10px; padding:13px 15px; margin-bottom:8px; transition:opacity .2s;
}
.task-card.done  { opacity:.6; border-color:rgba(0,184,148,.25); background:rgba(0,184,148,.04); }
.task-card.auto  { opacity:.55; border-color:rgba(162,155,254,.2); background:rgba(162,155,254,.04); }

.task-maq  { font-size:.67rem; font-weight:700; letter-spacing:.1em; color:var(--gold); text-transform:uppercase; margin-bottom:3px; }
.task-name { font-size:.87rem; color:var(--cream); line-height:1.35; }
.task-head { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; }
.freq-pill {
  font-size:.67rem; font-weight:700; border:1px solid; border-radius:4px;
  padding:2px 7px; white-space:nowrap; flex-shrink:0; margin-top:1px;
}

.slot-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-top:5px; }
.slot-label { font-size:.7rem; color:var(--text-dim); min-width:50px; }
.fecha-pill {
  font-size:.77rem; border:1px solid; border-radius:5px; padding:3px 9px;
}
.fecha-plan { color:var(--blue); background:rgba(116,185,255,.08); border-color:rgba(116,185,255,.25); }
.fecha-real { color:var(--green); background:rgba(0,184,148,.08); border-color:rgba(0,184,148,.25); }
.fecha-auto { color:var(--purple); background:rgba(162,155,254,.08); border-color:rgba(162,155,254,.2); }

.btn-hecho {
  background:rgba(0,184,148,.15); border:1px solid rgba(0,184,148,.4);
  color:var(--green); border-radius:7px; padding:5px 13px;
  font-family:Barlow,sans-serif; font-size:.8rem; font-weight:600; cursor:pointer;
}
.btn-hecho:hover  { background:rgba(0,184,148,.25); }
.btn-hecho:disabled { opacity:.45; cursor:default; }

.diario-note { font-size:.75rem; color:rgba(255,255,255,.3); font-style:italic; }
.no-fecha    { font-size:.75rem; color:rgba(255,255,255,.25); }

.stats-row {
  display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;
}
.stat-chip {
  font-size:.74rem; border:1px solid; border-radius:5px; padding:3px 10px;
}

.empty-state { text-align:center; padding:50px 20px; color:var(--text-dim); }
.empty-state svg { width:46px; height:46px; margin-bottom:14px; opacity:.25; display:block; margin-left:auto; margin-right:auto; }
.loading { text-align:center; padding:50px 20px; color:var(--text-dim); font-size:.9rem; }

/* Login */
#loginOverlay {
  position:fixed; inset:0; background:var(--bg); z-index:999;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.login-box {
  background:var(--surface2); border:1px solid rgba(255,255,255,.12);
  border-radius:14px; padding:28px 22px; width:100%; max-width:340px;
}
.login-box h2 { font-family:Oswald,sans-serif; color:var(--gold); font-size:1.2rem; margin-bottom:5px; }
.login-box p  { font-size:.82rem; color:var(--text-dim); margin-bottom:18px; }
.login-box label { font-size:.72rem; color:var(--text-dim); display:block; margin-bottom:5px; letter-spacing:.1em; text-transform:uppercase; }
.login-box input {
  width:100%; background:#0d1b2a; color:var(--cream);
  border:1px solid rgba(255,255,255,.2); border-radius:8px;
  padding:9px 12px; font-family:Barlow,sans-serif; font-size:.9rem; margin-bottom:14px;
}
.login-box button {
  width:100%; background:rgba(232,193,78,.15); border:1px solid rgba(232,193,78,.4);
  color:var(--gold); border-radius:8px; padding:10px;
  font-family:Barlow,sans-serif; font-size:.95rem; font-weight:700; cursor:pointer;
}
</style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>🔧 Mis Tareas</h2>
    <p>Introduce tu nombre para ver las tareas preventivas asignadas este mes.</p>
    <label>Nombre</label>
    <input id="loginNombre" type="text" placeholder="Ej: RAFA" autocomplete="off"
      style="text-transform:uppercase" onkeydown="if(event.key==='Enter')loginMec()">
    <button onclick="loginMec()">Entrar →</button>
  </div>
</div>

<header>
  <div>
    <div class="header-logo">PANALCOR · Mis Tareas</div>
    <div class="header-sub">Mantenimiento Preventivo</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="header-mec" id="headerMec"></span>
    <a href="panalcor_inicio.html" style="font-size:.77rem;color:var(--text-dim);text-decoration:none">← Inicio</a>
  </div>
</header>

<div class="mes-nav">
  <button onclick="navMes(-1)">← Ant.</button>
  <div class="mes-title" id="mesTitle">—</div>
  <button onclick="navMes(1)">Sig. →</button>
</div>

<div class="content" id="content">
  <div class="loading">Cargando...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const _FB_CFG = {
  apiKey:"AIzaSyC_AJEkrbWqfE65Mt_f5V0LfemPJc10UuU",
  authDomain:"panalcor-mantenimiento.firebaseapp.com",
  databaseURL:"https://panalcor-mantenimiento-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"panalcor-mantenimiento"
};
if(!firebase.apps.length) firebase.initializeApp(_FB_CFG);
const _DB = firebase.database();

const MESES_L = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const FREQ_CFG = {
  DIARIO:    {color:'#fd79a8',bg:'rgba(253,121,168,.12)',border:'rgba(253,121,168,.3)'},
  SEMANAL:   {color:'#00cec9',bg:'rgba(0,206,201,.12)', border:'rgba(0,206,201,.3)'},
  QUINCENAL: {color:'#6c5ce7',bg:'rgba(108,92,231,.12)',border:'rgba(108,92,231,.3)'},
  MENSUAL:   {color:'#e17055',bg:'rgba(225,112,85,.12)',border:'rgba(225,112,85,.3)'},
  ARRANQUE:  {color:'#00cec9',bg:'rgba(0,206,201,.12)', border:'rgba(0,206,201,.3)'},
  CIERRE:    {color:'#fd79a8',bg:'rgba(253,121,168,.12)',border:'rgba(253,121,168,.3)'},
};

let curMes = { year: new Date().getFullYear(), month: new Date().getMonth() };
let mecNombre = '';
let _plan = null;
let _comp = {};
let _compListener = null; // listener activo de completados

function mesKey(y,m){ return y+'-'+String(m+1).padStart(2,'0'); }
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDs(ds){
  if(!ds) return '—';
  const d = new Date(ds+'T12:00:00');
  return DIAS_ES[d.getDay()]+' '+d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0');
}

// ── Auto-login desde sesión activa ──
(function(){
  try {
    const s = JSON.parse(localStorage.getItem('panalcor_session')||'null');
    if(s && s.nombre && (!s.expires || Date.now() < s.expires)){
      mecNombre = s.nombre.toUpperCase();
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('headerMec').textContent = '👷 '+mecNombre;
      cargarMes();
    }
  } catch(e){}
})();

function loginMec(){
  const n = document.getElementById('loginNombre').value.trim().toUpperCase();
  if(!n){ alert('Introduce tu nombre'); return; }
  mecNombre = n;
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('headerMec').textContent = '👷 '+n;
  cargarMes();
}

function navMes(delta){
  let {year,month} = curMes;
  month += delta;
  if(month<0){year--;month=11;} if(month>11){year++;month=0;}
  curMes = {year,month};
  cargarMes();
}

async function cargarMes(){
  const {year,month} = curMes;
  const mk = mesKey(year,month);
  const tit = MESES_L[month].charAt(0).toUpperCase()+MESES_L[month].slice(1)+' '+year;
  document.getElementById('mesTitle').textContent = tit;
  document.getElementById('content').innerHTML = `<div class="loading">⏳ Cargando ${tit}...</div>`;

  // Desconectar listener anterior si existía
  if(_compListener) { _compListener.off(); _compListener = null; }

  try {
    const sp = await _DB.ref(`preventivo_plan/${mk}`).once('value');
    _plan = sp.val();
  } catch(e){
    document.getElementById('content').innerHTML =
      `<div class="empty-state"><p style="color:#e74c3c">⚠️ Sin conexión. Comprueba la red.</p></div>`;
    return;
  }

  if(!_plan||!_plan.tareas){
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>No hay plan publicado para <b>${tit}</b>.<br><span style="font-size:.8rem;opacity:.5">El administrador aún no ha publicado el plan.</span></p>
      </div>`;
    return;
  }

  // Listener en tiempo real para completados — se actualiza solo cuando el admin rellena
  _compListener = _DB.ref(`preventivo_completado/${mk}`);
  _compListener.on('value', snap => {
    _comp = snap.val() || {};
    renderMisTareas(mk);
  });
}

function renderMisTareas(mk){
  const tareas = (_plan.tareas||[]).filter(t =>
    t.mecanico.toUpperCase() === mecNombre ||
    t.frecuencia === 'ARRANQUE' || t.frecuencia === 'CIERRE'
  );

  if(!tareas.length){
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>No tienes tareas asignadas este mes.</p>
      </div>`;
    return;
  }

  // Stats
  let total=0, hechas=0;
  tareas.forEach(t=>{
    if(t.frecuencia==='DIARIO') return;
    const slots = Object.entries(t.fechas||{}).filter(([,v])=>typeof v==='string');
    slots.forEach(([wi])=>{ total++; if(_comp[`${t.id}_${wi}`]) hechas++; });
  });

  const tareasAC  = tareas.filter(t=>t.frecuencia==='ARRANQUE'||t.frecuencia==='CIERRE');
  const tareasReg = tareas.filter(t=>t.frecuencia!=='ARRANQUE'&&t.frecuencia!=='CIERRE');

  let html = `<div class="stats-row" style="margin-top:6px">
    <span class="stat-chip" style="color:#00b894;background:rgba(0,184,148,.1);border-color:rgba(0,184,148,.3)">✓ ${hechas} hechas</span>
    <span class="stat-chip" style="color:#e8c14e;background:rgba(232,193,78,.1);border-color:rgba(232,193,78,.3)">${total-hechas} pendientes</span>
  </div>`;

  if(tareasAC.length){
    html += `<div class="section-label">🔄 Arranque y Cierre — compartidas</div>`;
    tareasAC.forEach(t => { html += tarjetaCard(t, mk, true); });
  }
  if(tareasReg.length){
    html += `<div class="section-label">🔧 Mis tareas</div>`;
    tareasReg.forEach(t => { html += tarjetaCard(t, mk, false); });
  }

  document.getElementById('content').innerHTML = html;
}

function tarjetaCard(t, mk, isAC){
  const cfg = FREQ_CFG[t.frecuencia]||{color:'#fff',bg:'rgba(255,255,255,.05)',border:'rgba(255,255,255,.2)'};
  const slots = Object.entries(t.fechas||{}).filter(([,v])=>typeof v==='string');

  // Calcular estado general
  const allDone = slots.length > 0 && slots.every(([wi])=>_comp[`${t.id}_${wi}`]);
  const allAuto = slots.length > 0 && slots.every(([wi])=>_comp[`${t.id}_${wi}`]?.autoRelleno);
  const cls = allAuto ? 'auto' : allDone ? 'done' : '';

  let html = `<div class="task-card ${cls}" id="card_${t.id}">
    <div class="task-head">
      <div style="flex:1"><div class="task-maq">${escH(t.maquina||'GENERAL')}</div><div class="task-name">${escH(t.tarea)}</div></div>
      <span class="freq-pill" style="color:${cfg.color};background:${cfg.bg};border-color:${cfg.border}">${t.frecuencia}</span>
    </div>`;

  if(t.frecuencia==='DIARIO'){
    html += `<div class="slot-row"><span class="diario-note">Cada día de lunes a viernes</span></div>`;
  } else if(!slots.length){
    html += `<div class="slot-row"><span class="no-fecha">Sin fecha asignada aún</span></div>`;
  } else {
    slots.forEach(([wi, fechaPlan])=>{
      const clave = `${t.id}_${wi}`;
      const comp  = _comp[clave];
      let slotLabel = '';
      if(slots.length>1){
        if(t.frecuencia==='SEMANAL') slotLabel = `Semana ${parseInt(wi)+1}`;
        else if(wi==='0') slotLabel = '1ª mitad';
        else slotLabel = '2ª mitad';
      }
      const inputId = `fi_${t.id}_${wi}`;
      const fechaInput = comp ? comp.fechaReal : fechaPlan;
      const hecha = comp && !comp.autoRelleno;
      const autoRell = comp && comp.autoRelleno;

      html += `<div class="slot-row" style="flex-wrap:wrap;gap:6px;align-items:center">
        ${slotLabel ? `<span class="slot-label">${slotLabel}</span>` : ''}
        <span class="fecha-pill fecha-plan" style="font-size:.75rem">📅 Plan: ${fmtDs(fechaPlan)}</span>
        <input type="date" id="${inputId}" value="${fechaInput}"
          style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;padding:5px 10px;font-size:.82rem;outline:none"
          ${hecha?'':''}/>`;

      if(hecha){
        html += `<span style="color:#00b894;font-size:.8rem;font-weight:700">✅ Hecha</span>
          <button onclick="marcarHecha(${t.id},'${wi}','${mk}',this,document.getElementById('${inputId}').value)"
            style="background:rgba(0,184,148,.15);border:1px solid rgba(0,184,148,.4);color:#00b894;border-radius:8px;padding:4px 10px;font-size:.75rem;cursor:pointer">
            ✏️ Corregir fecha
          </button>`;
      } else if(autoRell){
        const etq = comp.retraso
          ? `<span style="background:#e17055;color:#fff;border-radius:4px;font-size:.7rem;padding:1px 6px;font-weight:700">RETRASO</span>`
          : `<span style="background:#00b894;color:#fff;border-radius:4px;font-size:.7rem;padding:1px 6px;font-weight:700">EN FECHA</span>`;
        html += `${etq}<button onclick="marcarHecha(${t.id},'${wi}','${mk}',this,document.getElementById('${inputId}').value)"
            style="background:rgba(116,185,255,.12);border:1px solid rgba(116,185,255,.35);color:#74b9ff;border-radius:8px;padding:4px 10px;font-size:.75rem;cursor:pointer">
            ✓ Confirmar / Corregir
          </button>`;
      } else {
        html += `<button onclick="marcarHecha(${t.id},'${wi}','${mk}',this,document.getElementById('${inputId}').value)"
            style="background:rgba(0,184,148,.12);border:1px solid rgba(0,184,148,.4);color:#00b894;border-radius:8px;padding:5px 14px;font-size:.82rem;font-weight:600;cursor:pointer">
            ${isAC?'✓ La hice yo':'✓ Marcar hecha'}
          </button>`;
      }
      html += `</div>`;
    });
  }

  html += `</div>`;
  return html;
}

async function marcarHecha(taskId, wi, mk, btn, fechaElegida){
  btn.disabled=true; btn.textContent='⏳';
  const hoy = new Date();
  const hoyDs = hoy.getFullYear()+'-'+String(hoy.getMonth()+1).padStart(2,'0')+'-'+String(hoy.getDate()).padStart(2,'0');
  const fechaReal = fechaElegida || hoyDs;
  try {
    await _DB.ref(`preventivo_completado/${mk}/${taskId}_${wi}`).set({
      hecho:true, fechaReal, fechaPlan:'', mecanico:mecNombre, autoRelleno:false, ts:Date.now()
    });
    _comp[`${taskId}_${wi}`] = {hecho:true, fechaReal, mecanico:mecNombre, autoRelleno:false};
    renderMisTareas(mk);
  } catch(e){
    btn.disabled=false; btn.textContent='✓ Marcar hecha';
    alert('⚠️ Error: '+e.message);
  }
}
</script>
</body>
</html>
