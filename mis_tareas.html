<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Mis Tareas — PANALCOR</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b2a; --navy-mid:#1a2d42; --navy-light:#243d56;
  --gold:#c9a227; --gold-light:#f0c040;
  --white:#f0f4f8; --green:#2ecc71; --red:#e74c3c; --yellow:#f39c12;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:80px}

/* ── LOGIN ── */
.login{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.login-box{background:var(--navy-mid);border:1px solid rgba(201,162,39,0.3);border-radius:18px;padding:36px 24px;width:100%;max-width:340px;text-align:center}
.login-box .ico{font-size:3rem;margin-bottom:10px}
.login-box h2{font-size:1.4rem;font-weight:900;color:var(--gold-light);margin-bottom:4px}
.login-box .sub{font-size:0.75rem;color:rgba(255,255,255,0.35);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:26px}
.login-box input{width:100%;background:var(--navy);color:var(--white);border:1px solid rgba(255,255,255,0.2);border-radius:9px;padding:14px;font-family:'Barlow',sans-serif;font-size:1.1rem;text-align:center;letter-spacing:0.2em;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#a07d1a);color:#0d1b2a;border:none;border-radius:9px;font-family:'Barlow',sans-serif;font-size:1rem;font-weight:900;letter-spacing:0.1em;cursor:pointer}
.login-err{color:var(--red);font-size:0.85rem;margin-top:8px;min-height:18px}

/* ── SELECTOR MECÁNICO ── */
.mec-selector{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:998;padding:24px;gap:14px}
.mec-selector h2{font-size:1.2rem;font-weight:900;color:var(--gold-light);letter-spacing:0.06em;margin-bottom:8px;text-align:center}
.mec-btn{width:100%;max-width:320px;padding:18px;background:var(--navy-mid);border:2px solid rgba(255,255,255,0.12);border-radius:12px;color:var(--white);font-family:'Barlow',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:12px}
.mec-btn:hover,.mec-btn:active{background:rgba(201,162,39,0.15);border-color:var(--gold)}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#0a1520,var(--navy-mid));border-bottom:2px solid var(--gold);padding:14px 16px;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-name{font-size:1.1rem;font-weight:900;color:var(--gold-light)}
.header-period{font-size:0.75rem;color:rgba(255,255,255,0.45);letter-spacing:0.08em}
.header-back{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);padding:7px 12px;border-radius:7px;font-family:'Barlow',sans-serif;font-size:0.8rem;cursor:pointer}

/* ── MES SELECTOR ── */
.mes-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mes-row label{font-size:0.78rem;color:rgba(255,255,255,0.45);letter-spacing:0.06em;flex-shrink:0}
#mesSelect{background:var(--navy-light);color:var(--white);border:1px solid rgba(201,162,39,0.35);border-radius:7px;padding:5px 10px;font-family:'Barlow',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;flex:1;max-width:200px}
#mesSelect:focus{outline:none;border-color:var(--gold)}

/* ── PROGRESS BAR ── */
.progress-wrap{background:rgba(255,255,255,0.07);border-radius:8px;height:10px;overflow:hidden}
.progress-bar{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width .5s}
.progress-label{display:flex;justify-content:space-between;font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:5px}
.progress-label b{color:var(--gold-light)}

/* ── CONTENIDO ── */
.content{padding:14px 14px 20px}

/* ── MÁQUINA CARD ── */
.maq-card{background:var(--navy-mid);border:1px solid rgba(255,255,255,0.1);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:all .2s}
.maq-card.done{border-color:rgba(46,204,113,0.3)}
.maq-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.maq-header:active{background:rgba(255,255,255,0.04)}
.maq-name{font-size:1rem;font-weight:700;letter-spacing:0.03em}
.maq-count{font-size:0.78rem;padding:4px 10px;border-radius:20px;font-weight:700}
.maq-count.all-done{background:rgba(46,204,113,0.2);color:var(--green);border:1px solid rgba(46,204,113,0.3)}
.maq-count.pending{background:rgba(243,156,18,0.2);color:var(--yellow);border:1px solid rgba(243,156,18,0.3)}
.maq-count.empty{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4)}
.maq-arrow{font-size:0.8rem;color:rgba(255,255,255,0.3);transition:transform .2s;margin-left:8px}
.maq-card.open .maq-arrow{transform:rotate(180deg)}

/* ── TAREAS ── */
.tareas-list{border-top:1px solid rgba(255,255,255,0.07);display:none}
.maq-card.open .tareas-list{display:block}
.tarea-item{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.tarea-item:last-child{border-bottom:none}
.tarea-item:active{background:rgba(255,255,255,0.04)}
.tarea-check{width:26px;height:26px;flex-shrink:0;border:2px solid rgba(255,255,255,0.25);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;margin-top:1px}
.tarea-item.done .tarea-check{background:rgba(46,204,113,0.25);border-color:var(--green);color:var(--green)}
.tarea-item.done .tarea-desc{text-decoration:line-through;color:rgba(255,255,255,0.35)}
.tarea-body{flex:1}
.tarea-desc{font-size:0.95rem;line-height:1.4;font-weight:500}
.tarea-meta{font-size:0.72rem;color:rgba(255,255,255,0.35);margin-top:3px}
.tarea-done-info{font-size:0.7rem;color:var(--green);margin-top:3px}

/* ── MODAL CHECK-OFF ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:900;padding:20px}
.modal-box{background:var(--navy-mid);border:1px solid rgba(201,162,39,0.35);border-radius:16px;padding:24px;width:100%;max-width:360px}
.modal-box h3{font-size:1.1rem;font-weight:900;color:var(--gold-light);margin-bottom:6px}
.modal-tarea-desc{font-size:0.88rem;color:rgba(255,255,255,0.6);margin-bottom:18px;line-height:1.4;padding:10px;background:rgba(255,255,255,0.05);border-radius:8px;border-left:3px solid var(--gold)}
.modal-label{font-size:0.78rem;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
.turno-btns{display:flex;gap:8px;margin-bottom:18px}
.turno-btn{flex:1;padding:10px 4px;background:var(--navy-light);border:2px solid rgba(255,255,255,0.1);border-radius:9px;color:var(--white);font-family:'Barlow',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.turno-btn:hover{border-color:var(--gold);background:rgba(201,162,39,0.15)}
.turno-btn.sel{background:rgba(201,162,39,0.25);border-color:var(--gold);color:var(--gold-light)}
#checkNotas{width:100%;background:var(--navy);color:var(--white);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px;font-family:'Barlow',sans-serif;font-size:0.9rem;resize:none;height:80px;margin-bottom:18px}
#checkNotas:focus{outline:none;border-color:var(--gold)}
.modal-btns{display:flex;gap:10px}
.btn-cancel{flex:1;padding:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);border-radius:8px;font-family:'Barlow',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer}
.btn-confirm{flex:2;padding:12px;background:linear-gradient(135deg,var(--gold),#a07d1a);border:none;color:#0d1b2a;border-radius:8px;font-family:'Barlow',sans-serif;font-size:0.9rem;font-weight:900;cursor:pointer}
.btn-uncheck{width:100%;padding:10px;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.35);color:var(--red);border-radius:8px;font-family:'Barlow',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-top:10px}

/* ── ESTADO VACÍO ── */
.empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3)}
.empty-state .ico{font-size:3rem;margin-bottom:16px}
.empty-state p{font-size:1rem;line-height:1.6}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy-mid);border:1px solid rgba(201,162,39,0.4);border-radius:10px;padding:12px 22px;font-size:0.9rem;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BANNER COMPLETADO ── */
.banner-done{background:linear-gradient(135deg,rgba(46,204,113,0.2),rgba(39,174,96,0.1));border:1px solid rgba(46,204,113,0.4);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;display:none}
.banner-done h3{font-size:1.1rem;font-weight:900;color:var(--green);margin-bottom:4px}
.banner-done p{font-size:0.85rem;color:rgba(255,255,255,0.5)}
</style>
</head>

if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
var DB = firebase.database();

/* ══ ESTADO ══ */
var MEC_SESION_KEY = 'mecSesion';
var mecActual      = null;
var mesActual      = '';       // YYYY-MM
var asigs          = {};       // { pushId: {tarea,mecanico,hecho,...} }

/* ══ SESION ══ */
function _mecSesionValida(){
  try {
    var s = JSON.parse(localStorage.getItem(MEC_SESION_KEY) || 'null');
    if(!s || !s.nombre) return false;
    if(s.expires !== null && Date.now() > s.expires){ localStorage.removeItem(MEC_SESION_KEY); return false; }
    return s.nombre;
  } catch(e){ return false; }
}

/* ══ LOGIN ══ */
(function cargarMecLoginMT(){
  var sel = document.getElementById('mecLoginNombreSel');
  if(!sel) return;
  var fb = ['ALEX','RAFA','GREGORIO','JAVIER E','JAVIER H','RUBIEL','ALBERTO'];
  function poblar(lista){ lista.forEach(function(n){ var o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); }); }
  DB.ref('config/mecanicos').once('value')
    .then(function(s){ var v=s.val(); poblar(v&&v.length?v:fb); })
    .catch(function(){ poblar(fb); });
})();

function doLogin(){
  var nombre  = document.getElementById('mecLoginNombreSel').value;
  var pw      = document.getElementById('pwInput').value;
  var err     = document.getElementById('loginErr');
  var esMiTel = document.getElementById('loginMiTel').checked;
  err.textContent = '';
  if(!nombre){ err.textContent = '⚠️ Selecciona tu nombre'; return; }
  if(!pw)    { err.textContent = '⚠️ Introduce la contrasena'; return; }
  DB.ref('config/mecanicos_pwd').once('value').then(function(snap){
    var pwsObj = snap.val() || {};
    var pwEsperada = pwsObj[nombre] || null;
    if(!pwEsperada){ err.textContent = '❌ Sin contrasena asignada. Contacta con el responsable.'; return; }
    if(pw !== pwEsperada){
      err.textContent = '❌ Contrasena incorrecta';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
      return;
    }
    DB.ref('config/mecSessionHoras').once('value').then(function(snap2){
      var horas = snap2.val() || 8;
      var expires = esMiTel ? null : (Date.now() + horas * 3600 * 1000);
      localStorage.setItem(MEC_SESION_KEY, JSON.stringify({nombre:nombre, expires:expires}));
      mecActual = nombre;
      document.getElementById('loginScreen').style.display = 'none';
      arrancarApp();
    }).catch(function(){
      var expires = esMiTel ? null : (Date.now() + 8 * 3600 * 1000);
      localStorage.setItem(MEC_SESION_KEY, JSON.stringify({nombre:nombre, expires:expires}));
      mecActual = nombre;
      document.getElementById('loginScreen').style.display = 'none';
      arrancarApp();
    });
  }).catch(function(){ err.textContent = '❌ Error de conexion. Intentalo de nuevo.'; });
}

/* ══ SELECTOR MECANICO (solo admin bypass) ══ */
function getMecanicos(cb){
  DB.ref('config/mecanicos').once('value')
    .then(function(s){
      var val = s.val();
      cb(val && val.length ? val : ['ALEX','RAFA','GREGORIO','JAVIER E','JAVIER H','RUBIEL','ALBERTO']);
    })
    .catch(function(){ cb(['ALEX','RAFA','GREGORIO','JAVIER E','JAVIER H','RUBIEL','ALBERTO']); });
}

  getMecanicos(function(mecanicos){
    var div = document.getElementById('mecBtnList');
    div.innerHTML = mecanicos.map(function(m){
      return '<button class="mec-btn" onclick="seleccionarMecanico(\''+m+'\')">'
           + '<span style="font-size:1.4rem">👷</span><span>'+m+'</span></button>';
    }).join('');

  });
}

function seleccionarMecanico(nombre){
  mecActual = nombre;
  document.getElementById('mecSelector').style.display = 'none';
  arrancarApp();
}

function cambiarMecanico(){
  localStorage.removeItem(MEC_SESION_KEY);
  mecActual = null;
  if(dbListener){ dbListener.off(); dbListener = null; }
  document.getElementById('app').style.display = 'none';
  if(_adminSessionValida()){
    mostrarSelectorMecanico();
  } else {
    document.getElementById('loginErr').textContent = '';

/* ══ HELPERS MES ══ */
function mesActualISO(){
  var d = new Date();
  var m = d.getMonth()+1;
  return d.getFullYear() + '-' + (m<10?'0'+m:m);
}

function labelMes(ym){
  var parts = ym.split('-');
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return meses[parseInt(parts[1])-1] + ' ' + parts[0];
}

/* Genera lista de meses: 6 hacia atrás + 6 hacia adelante desde hoy */
function generarMeses(){
  var meses = [];
  var hoy = new Date();
  for(var i=-6; i<=6; i++){
    var d = new Date(hoy.getFullYear(), hoy.getMonth()+i, 1);
    var m = d.getMonth()+1;
    var ym = d.getFullYear()+'-'+(m<10?'0'+m:m);
    meses.push(ym);
  }
  return meses;
}

/* ══ ARRANQUE ══ */
function arrancarApp(){
  document.getElementById('app').style.display = 'block';
  document.getElementById('hdrName').textContent = '👷 ' + mecActual;

  mesActual = mesActualISO();

  /* Poblar selector de meses */
  var sel = document.getElementById('mesSelect');
  var meses = generarMeses();
  sel.innerHTML = '';
  meses.forEach(function(ym){
    var opt = document.createElement('option');
    opt.value = ym;
    opt.textContent = labelMes(ym);
    if(ym === mesActual) opt.selected = true;
    sel.appendChild(opt);
  });

  cargarMes(mesActual);
  renderAvPendientes();
  cargarRecordatoriosMec();
  cargarIntegralesMec();
}

/* ══ AVERÍAS PENDIENTES del mecánico ══ */
function renderAvPendientes(){
  var wrap = document.getElementById('avPendWrap');
  if(!wrap) return;
  try {
    var av = JSON.parse(localStorage.getItem('averias_v1') || '[]');
    var mias = av.filter(function(a){
      return (a.estado === 'EN CURSO' || a.estado === 'PENDIENTE REPUESTO')
          && a.mecanicos && a.mecanicos.indexOf(mecActual) !== -1;
    });
    if(!mias.length){ wrap.innerHTML = ''; return; }

    var hoy = Date.now();
    var items = mias.map(function(a){
      var dias      = Math.floor((hoy - (a.ts || hoy)) / 86400000);
      var diasTxt   = dias === 0 ? 'hoy' : dias === 1 ? 'hace 1 día' : 'hace ' + dias + ' días';
      var diasColor = dias >= 3 ? '#e74c3c' : dias >= 1 ? '#f39c12' : 'rgba(255,255,255,0.4)';
      var dotColor  = a.estado === 'EN CURSO' ? '#e74c3c' : '#f39c12';
      return '<div style="display:flex;align-items:center;gap:12px;padding:11px 14px;'
        + 'border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:background .15s"'
        + ' onclick="window.location=\'averias.html?retomar=' + a.id + '\'"'
        + ' onmouseover="this.style.background=\'rgba(255,255,255,0.04)\'"'
        + ' onmouseout="this.style.background=\'\'">'
        + '<span style="width:9px;height:9px;border-radius:50%;background:' + dotColor + ';flex-shrink:0;display:inline-block"></span>'
        + '<div style="flex:1;min-width:0">'
          + '<div style="font-size:0.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'
            + (a.maqNombre||'') + '</div>'
          + '<div style="font-size:0.75rem;color:rgba(255,255,255,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'
            + (a.descripcion||'').substring(0,60) + ' · ' + (a.estado||'')
          + '</div>'
        + '</div>'
        + '<div style="text-align:right;flex-shrink:0">'
          + '<div style="font-size:0.72rem;color:' + diasColor + ';font-weight:700">' + diasTxt + '</div>'
          + '<div style="font-size:0.7rem;color:rgba(255,255,255,0.35);margin-top:2px">Retomar →</div>'
        + '</div>'
        + '</div>';
    }).join('');

    wrap.innerHTML = '<div style="background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.3);'
      + 'border-radius:12px;margin-bottom:14px;overflow:hidden">'
      + '<div style="padding:10px 14px;border-bottom:1px solid rgba(231,76,60,0.2);'
        + 'font-size:0.7rem;letter-spacing:.12em;text-transform:uppercase;color:#e74c3c;font-weight:700">'
        + '🚨 Averías pendientes (' + mias.length + ')'
      + '</div>'
      + items
      + '</div>';
  } catch(e){ wrap.innerHTML = ''; }
}

function cambiarMes(){
  var sel = document.getElementById('mesSelect');
  mesActual = sel.value;
  cargarMes(mesActual);
}

/* ══ CARGAR MES DESDE FIREBASE ══ */
function cargarMes(mes){
  document.getElementById('hdrPeriod').textContent = labelMes(mes);
  document.getElementById('tareasWrap').innerHTML =
    '<div class="empty-state"><div class="ico">⏳</div><p>Cargando tareas...</p></div>';

  /* Detach listener anterior si existe */
  if(dbListener){ dbListener.off(); dbListener = null; }

  var ref = DB.ref('asignaciones/' + mes);
  dbListener = ref;

  ref.on('value', function(snap){
    var val = snap.val() || {};
    /* Filtrar solo mis tareas */
    asigs = {};
    Object.keys(val).forEach(function(k){
      if(val[k].mecanico === mecActual) asigs[k] = val[k];
    });
    renderTareas();
  }, function(){
    document.getElementById('tareasWrap').innerHTML =
      '<div class="empty-state"><div class="ico">❌</div><p>Error de conexión.<br>Comprueba que tienes internet.</p></div>';
  });
}

/* ══ RENDER TAREAS ══ */
function renderTareas(){
  var lista = Object.keys(asigs).map(function(k){ return Object.assign({_id:k}, asigs[k]); });

  if(!lista.length){
    document.getElementById('tareasWrap').innerHTML =
      '<div class="empty-state"><div class="ico">📋</div><p>No tienes tareas asignadas para '+labelMes(mesActual)+'.</p></div>';
    actualizarProgreso([]);
    return;
  }

  /* Agrupar por instancia */
  var porMaquina = {};
  lista.forEach(function(t){
    var k = t.instancia || t.maquina || 'General';
    if(!porMaquina[k]) porMaquina[k] = { nombre:k, tareas:[] };
    porMaquina[k].tareas.push(t);
  });

  actualizarProgreso(lista);

  var wrap = document.getElementById('tareasWrap');
  wrap.innerHTML = '';

  /* Banner completado */
  var allDone = lista.every(function(t){ return t.hecho; });
  document.getElementById('bannerDone').style.display = allDone ? 'block' : 'none';

  var freqRep = {DIARIO:'~20× mes',SEMANAL:'4× mes',QUINCENAL:'2× mes',
                 MENSUAL:'1× mes',SEMESTRAL:'2/año',ANUAL:'1/año',TRIMESTRAL:'4/año'};

  Object.keys(porMaquina).sort().forEach(function(k){
    var maq = porMaquina[k];
    var total  = maq.tareas.length;
    var hechas = maq.tareas.filter(function(t){ return t.hecho; }).length;
    var allMaqDone = hechas === total;

    var card = document.createElement('div');
    card.className = 'maq-card' + (allMaqDone ? ' done' : '');

    var countClass = allMaqDone ? 'all-done' : hechas > 0 ? 'pending' : 'empty';
    var countTxt   = allMaqDone ? '✅ Completada' : hechas+'/'+total;

    var tareasHtml = maq.tareas.map(function(t){
      var desc   = t.tarea || '—';
      var freq   = t.frecuencia || '';
      var rep    = freqRep[freq] || freq;
      var turno  = t.turno ? ({MANANA:'🌅 Mañana',TARDE:'🌇 Tarde',NOCHE:'🌙 Noche'}[t.turno]||t.turno) : '';
      var fechaStr = '';
      if(t.hecho && t.hechoEn){
        var d = new Date(t.hechoEn);
        fechaStr = d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'})
                 + ' ' + d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      }
      var notaStr = t.notas ? '<span style="opacity:.6"> · '+escHtml(t.notas)+'</span>' : '';
      return '<div class="tarea-item'+(t.hecho?' done':'')+'" id="ti_'+t._id+'" onclick="abrirCheckModal(\''+t._id+'\')">'
           + '<div class="tarea-check">'+(t.hecho?'✓':'')+'</div>'
           + '<div class="tarea-body">'
           + '<div class="tarea-desc">'+escHtml(desc)+'</div>'
           + '<div class="tarea-meta">'
           + (freq ? '<span style="background:rgba(201,162,39,0.15);border:1px solid rgba(201,162,39,0.3);border-radius:10px;padding:1px 7px;font-size:0.7rem;color:#c9a227">'+freq+'</span>'
                   + (rep ? ' <span style="opacity:.5">'+rep+'</span>' : '') : '')
           + '</div>'
           + (t.hecho ? '<div class="tarea-done-info">✅ '+fechaStr+(turno?' · '+turno:'')+''+notaStr+'</div>' : '')
           + '</div></div>';
    }).join('');

    card.innerHTML =
      '<div class="maq-header" onclick="toggleMaq(this.parentElement)">'
      + '<div><div class="maq-name">'+escHtml(maq.nombre)+'</div></div>'
      + '<div style="display:flex;align-items:center;gap:6px">'
      + '<span class="maq-count '+countClass+'">'+countTxt+'</span>'
      + '<span class="maq-arrow">▼</span>'
      + '</div></div>'
      + '<div class="tareas-list">'+tareasHtml+'</div>';

    wrap.appendChild(card);

    if(!allMaqDone) card.classList.add('open');
  });
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleMaq(card){ card.classList.toggle('open'); }

/* ══ PROGRESO ══ */
function actualizarProgreso(lista){
  var total  = lista.length;
  var hechas = lista.filter(function(t){ return t.hecho; }).length;
  var pct    = total ? Math.round(hechas/total*100) : 0;
  document.getElementById('progressBar').style.width  = pct+'%';
  document.getElementById('progressTxt').textContent  = hechas+' de '+total+' tareas';
  document.getElementById('progressPct').textContent  = pct+'%';
}

/* ══ MODAL CHECK-OFF ══ */
var checkId     = null;
var turnoSel    = null;

function abrirCheckModal(id){
  var t = asigs[id];
  if(!t) return;
  checkId  = id;
  turnoSel = t.turno || null;

  document.getElementById('checkTareaDesc').textContent = (t.instancia||t.maquina||'') + ' — ' + (t.tarea||'—');
  document.getElementById('checkNotas').value = t.notas || '';

  /* Botones turno */
  ['MANANA','TARDE','NOCHE'].forEach(function(tr){
    var btn = document.getElementById('tb-'+tr);
    btn.classList.toggle('sel', tr === turnoSel);
  });

  var esDone = !!t.hecho;
  document.getElementById('checkModalTitle').textContent = esDone ? '📋 Detalle de tarea' : '✅ Marcar como hecha';
  document.getElementById('btnConfirm').style.display  = esDone ? 'none' : '';
  document.getElementById('btnUncheck').style.display  = esDone ? '' : 'none';

  document.getElementById('checkModal').style.display = 'flex';
}

function selTurno(tr){
  turnoSel = (turnoSel === tr) ? null : tr;
  ['MANANA','TARDE','NOCHE'].forEach(function(t){
    document.getElementById('tb-'+t).classList.toggle('sel', t === turnoSel);
  });
}

function cerrarCheckModal(){
  document.getElementById('checkModal').style.display = 'none';
  checkId = null;
  turnoSel = null;
}

function confirmarCheck(){
  if(!checkId) return;
  var notas = document.getElementById('checkNotas').value.trim();

  DB.ref('asignaciones/'+mesActual+'/'+checkId).update({
    hecho: true,
    hechoEn: new Date().toISOString(),
    turno: turnoSel || null,
    notas: notas
  }).then(function(){
    showToast('✅ Tarea completada');
    cerrarCheckModal();
  }).catch(function(){
    showToast('❌ Error al guardar');
  });
}

function desmarcarTarea(){
  if(!checkId) return;
  DB.ref('asignaciones/'+mesActual+'/'+checkId).update({
    hecho: false,
    hechoEn: null,
    turno: null,
    notas: ''
  }).then(function(){
    showToast('↩️ Tarea desmarcada');
    cerrarCheckModal();
  }).catch(function(){
    showToast('❌ Error al guardar');
  });
}

/* ══ TOAST ══ */
var toastT;
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

/* ══ ARRANQUE ══ */
function _adminSessionValida(){
  var t = parseInt(localStorage.getItem('adminSession') || 0);
  return t > 0 && (Date.now() - t) < 8 * 3600 * 1000;
}
(function(){
  var nombre = _mecSesionValida();
  if(nombre){
    mecActual = nombre;
    document.getElementById('loginScreen').style.display = 'none';
    arrancarApp();
    return;
  }
  if(_adminSessionValida()){
    document.getElementById('loginScreen').style.display = 'none';
    mostrarSelectorMecanico();
  }
})();

// ══════════════════════════════════════════════════════════════
// INTEGRALES — zona informativa para mecánicos
// ══════════════════════════════════════════════════════════════
function cargarIntegralesMec() {
  var wrap = document.getElementById('integralesWrap');
  if (!wrap) return;
  DB.ref('integrales').once('value').then(function(snap) {
    var data = snap.val() || {};
    var lista = Object.values(data).filter(function(it) {
      return it.estado === 'programada' || it.estado === 'en_curso';
    }).sort(function(a, b) {
      return (a.mesPrevisto || '').localeCompare(b.mesPrevisto || '');
    });
    renderIntegralesMec(lista);
  }).catch(function() {});
}

function _intMesMec(ym) {
  if (!ym) return '—';
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var p = ym.split('-');
  return meses[parseInt(p[1]||1)-1] + ' ' + p[0];
}

function renderIntegralesMec(lista) {
  var wrap = document.getElementById('integralesWrap');
  if (!wrap) return;
  if (!lista.length) { wrap.innerHTML = ''; return; }

  var html = '<div style="margin-bottom:14px">'
    + '<div style="font-size:1.05rem;font-weight:700;font-style:italic;letter-spacing:0.04em;color:#f39c12;margin-bottom:10px;padding-left:2px;text-shadow:0 0 12px rgba(243,156,18,0.4)">🔩 Mantenimientos integrales previstos &mdash; Sin asignaci&oacute;n</div>'
    + '<div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch">';

  lista.forEach(function(it) {
    var enCurso = it.estado === 'en_curso';
    var nComp = Object.keys(it.componentes || {}).length;
    var bColor = enCurso ? '#3498db' : '#f39c12';
    var bBg    = enCurso ? 'rgba(52,152,219,0.12)' : 'rgba(243,156,18,0.08)';
    var badge  = enCurso ? '🔵 En curso' : '🟡 Programado';
    html += '<div style="flex:0 0 auto;min-width:180px;max-width:220px;background:var(--navy-mid);'
          + 'border:1px solid '+bColor+'40;border-left:3px solid '+bColor+';border-radius:10px;padding:12px 14px">'
          + '<div style="font-size:0.68rem;font-weight:700;color:'+bColor+';margin-bottom:6px">'+badge+'</div>'
          + '<div style="font-size:0.9rem;font-weight:700;color:#fff;line-height:1.3;margin-bottom:5px">' + escHtmlMec(it.maqNombre) + '</div>'
          + (it.descripcion ? '<div style="font-size:0.72rem;color:rgba(255,255,255,0.4);margin-bottom:5px">'+escHtmlMec(it.descripcion)+'</div>' : '')
          + '<div style="font-size:0.75rem;color:rgba(255,255,255,0.5)">📅 ' + _intMesMec(it.mesPrevisto) + '</div>'
          + '<div style="font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:2px">🔩 ' + nComp + ' componente' + (nComp!==1?'s':'') + '</div>'
          + '</div>';
  });

  html += '</div></div>';
  wrap.innerHTML = html;
}

function escHtmlMec(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════
// RECORDATORIOS ASIGNADOS AL MECÁNICO
// ══════════════════════════════════════════════════
var _recDbListener = null;

function cargarRecordatoriosMec() {
  if (_recDbListener) { _recDbListener.off(); _recDbListener = null; }
  var wrap = document.getElementById('recordatoriosWrap');
  if (!wrap || !mecActual) return;

  _recDbListener = DB.ref('recordatorios');
  _recDbListener.on('value', function(snap) {
    var data = snap.val() || {};
    var mios = Object.keys(data)
      .map(function(k){ return Object.assign({ _id: k }, data[k]); })
      .filter(function(r){ return r.mecanico === mecActual && r.estado !== 'realizado'; });
    renderRecordatoriosMec(mios);
  });
}

function renderRecordatoriosMec(lista) {
  var wrap = document.getElementById('recordatoriosWrap');
  if (!wrap) return;
  if (!lista.length) { wrap.innerHTML = ''; return; }

  var items = lista.map(function(r) {
    var prioColor = r.prioridad === 'alta' ? '#e74c3c' : r.prioridad === 'baja' ? '#2ecc71' : '#f39c12';
    var fechaHora = [r.fecha, r.hora].filter(Boolean).join(' ');
    return '<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;'
         + 'border-bottom:1px solid rgba(255,255,255,0.06)">'
         + '<span style="width:9px;height:9px;border-radius:50%;background:' + prioColor + ';flex-shrink:0;margin-top:5px;display:inline-block"></span>'
         + '<div style="flex:1;min-width:0">'
           + '<div style="font-size:.92rem;font-weight:700">' + escHtmlMec(r.titulo || '—') + '</div>'
           + (r.descripcion ? '<div style="font-size:.78rem;color:rgba(255,255,255,.45);margin-top:2px">' + escHtmlMec(r.descripcion) + '</div>' : '')
           + (fechaHora ? '<div style="font-size:.72rem;color:rgba(255,255,255,.3);margin-top:2px">📅 ' + escHtmlMec(fechaHora) + '</div>' : '')
         + '</div>'
         + '<button onclick="marcarRecordatorioHecho(\'' + r._id + '\')"'
         + ' style="background:rgba(46,204,113,.2);border:1px solid rgba(46,204,113,.4);color:#2ecc71;'
         + 'border-radius:8px;padding:7px 14px;font-family:\'Barlow\',sans-serif;font-size:.82rem;'
         + 'font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">✅ Hecho</button>'
         + '</div>';
  }).join('');

  wrap.innerHTML = '<div style="background:rgba(201,162,39,0.07);border:1px solid rgba(201,162,39,0.3);'
    + 'border-radius:12px;margin-bottom:14px;overflow:hidden">'
    + '<div style="padding:10px 14px;border-bottom:1px solid rgba(201,162,39,0.2);'
      + 'font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:700">'
      + '🔔 Recordatorios asignados (' + lista.length + ')'
    + '</div>'
    + items
    + '</div>';
}

function marcarRecordatorioHecho(id) {
  DB.ref('recordatorios/' + id).update({
    estado      : 'realizado',
    realizadoEn : new Date().toISOString(),
    realizadoPor: mecActual
  }).then(function() {
    showToast('✅ Recordatorio marcado como realizado');
  }).catch(function() {
    showToast('❌ Error al actualizar');
  });
}
