<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Mis Tareas — PANALCOR</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b2a; --navy-mid:#1a2d42; --navy-light:#243d56;
  --gold:#c9a227; --gold-light:#f0c040;
  --white:#f0f4f8; --green:#2ecc71; --red:#e74c3c; --yellow:#f39c12;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:80px}

/* ── LOGIN ── */
.login{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.login-box{background:var(--navy-mid);border:1px solid rgba(201,162,39,0.3);border-radius:18px;padding:36px 24px;width:100%;max-width:340px;text-align:center}
.login-box .ico{font-size:3rem;margin-bottom:10px}
.login-box h2{font-size:1.4rem;font-weight:900;color:var(--gold-light);margin-bottom:4px}
.login-box .sub{font-size:0.75rem;color:rgba(255,255,255,0.35);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:26px}
.login-box input{width:100%;background:var(--navy);color:var(--white);border:1px solid rgba(255,255,255,0.2);border-radius:9px;padding:14px;font-family:'Barlow',sans-serif;font-size:1.1rem;text-align:center;letter-spacing:0.2em;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#a07d1a);color:#0d1b2a;border:none;border-radius:9px;font-family:'Barlow',sans-serif;font-size:1rem;font-weight:900;letter-spacing:0.1em;cursor:pointer}
.login-err{color:var(--red);font-size:0.85rem;margin-top:8px;min-height:18px}

/* ── SELECTOR MECÁNICO ── */
.mec-selector{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:998;padding:24px;gap:14px}
.mec-selector h2{font-size:1.2rem;font-weight:900;color:var(--gold-light);letter-spacing:0.06em;margin-bottom:8px;text-align:center}
.mec-btn{width:100%;max-width:320px;padding:18px;background:var(--navy-mid);border:2px solid rgba(255,255,255,0.12);border-radius:12px;color:var(--white);font-family:'Barlow',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:12px}
.mec-btn:hover,.mec-btn:active{background:rgba(201,162,39,0.15);border-color:var(--gold)}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#0a1520,var(--navy-mid));border-bottom:2px solid var(--gold);padding:14px 16px;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-name{font-size:1.1rem;font-weight:900;color:var(--gold-light)}
.header-period{font-size:0.75rem;color:rgba(255,255,255,0.45);letter-spacing:0.08em}
.header-back{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);padding:7px 12px;border-radius:7px;font-family:'Barlow',sans-serif;font-size:0.8rem;cursor:pointer}

/* ── PROGRESS BAR ── */
.progress-wrap{background:rgba(255,255,255,0.07);border-radius:8px;height:10px;overflow:hidden}
.progress-bar{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width .5s}
.progress-label{display:flex;justify-content:space-between;font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:5px}
.progress-label b{color:var(--gold-light)}

/* ── CONTENIDO ── */
.content{padding:14px 14px 20px}

/* ── MÁQUINA CARD ── */
.maq-card{background:var(--navy-mid);border:1px solid rgba(255,255,255,0.1);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:all .2s}
.maq-card.done{border-color:rgba(46,204,113,0.3)}
.maq-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.maq-header:active{background:rgba(255,255,255,0.04)}
.maq-name{font-size:1rem;font-weight:700;letter-spacing:0.03em}
.maq-count{font-size:0.78rem;padding:4px 10px;border-radius:20px;font-weight:700}
.maq-count.all-done{background:rgba(46,204,113,0.2);color:var(--green);border:1px solid rgba(46,204,113,0.3)}
.maq-count.pending{background:rgba(243,156,18,0.2);color:var(--yellow);border:1px solid rgba(243,156,18,0.3)}
.maq-count.empty{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4)}
.maq-arrow{font-size:0.8rem;color:rgba(255,255,255,0.3);transition:transform .2s;margin-left:8px}
.maq-card.open .maq-arrow{transform:rotate(180deg)}

/* ── TAREAS ── */
.tareas-list{border-top:1px solid rgba(255,255,255,0.07);display:none}
.maq-card.open .tareas-list{display:block}
.tarea-item{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.tarea-item:last-child{border-bottom:none}
.tarea-item:active{background:rgba(255,255,255,0.04)}
.tarea-check{width:26px;height:26px;flex-shrink:0;border:2px solid rgba(255,255,255,0.25);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;margin-top:1px}
.tarea-item.done .tarea-check{background:rgba(46,204,113,0.25);border-color:var(--green);color:var(--green)}
.tarea-item.done .tarea-desc{text-decoration:line-through;color:rgba(255,255,255,0.35)}
.tarea-body{flex:1}
.tarea-desc{font-size:0.95rem;line-height:1.4;font-weight:500}
.tarea-meta{font-size:0.72rem;color:rgba(255,255,255,0.35);margin-top:3px}
.tarea-done-info{font-size:0.7rem;color:var(--green);margin-top:3px}

/* ── ESTADO VACÍO ── */
.empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3)}
.empty-state .ico{font-size:3rem;margin-bottom:16px}
.empty-state p{font-size:1rem;line-height:1.6}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy-mid);border:1px solid rgba(201,162,39,0.4);border-radius:10px;padding:12px 22px;font-size:0.9rem;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BANNER COMPLETADO ── */
.banner-done{background:linear-gradient(135deg,rgba(46,204,113,0.2),rgba(39,174,96,0.1));border:1px solid rgba(46,204,113,0.4);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;display:none}
.banner-done h3{font-size:1.1rem;font-weight:900;color:var(--green);margin-bottom:4px}
.banner-done p{font-size:0.85rem;color:rgba(255,255,255,0.5)}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login" id="loginScreen">
  <div class="login-box">
    <div class="ico">🔧</div>
    <h2>PANALCOR S.L.</h2>
    <div class="sub">Mantenimiento Preventivo</div>
    <input type="password" id="pwInput" placeholder="Contraseña" autocomplete="off"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">ENTRAR</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ══ SELECTOR MECÁNICO ══ -->
<div class="mec-selector" id="mecSelector" style="display:none">
  <h2>👷 ¿Quién eres?</h2>
  <div id="mecBtnList"></div>
</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none">

  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-name" id="hdrName">👷 —</div>
        <div class="header-period" id="hdrPeriod">Cargando plan...</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <a href="panalcor_inicio.html" style="display:inline-flex;align-items:center;gap:4px;padding:6px 10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;text-decoration:none;font-size:0.78rem;font-weight:600">🏠</a>
        <button class="header-back" onclick="cambiarMecanico()">Cambiar</button>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-label"><span id="progressTxt">0 de 0 tareas</span><b id="progressPct">0%</b></div>
  </div>

  <div class="content">
    <div class="banner-done" id="bannerDone">
      <h3>🎉 ¡Todo completado!</h3>
      <p>Has terminado todas tus tareas de este período.</p>
    </div>
    <div id="tareasWrap"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══ FIREBASE ══ */
const FB_CFG = {
  apiKey:"AIzaSyC_AJEkrbWqfE65Mt_f5V0LfemPJc10UuU",
  authDomain:"panalcor-mantenimiento.firebaseapp.com",
  databaseURL:"https://panalcor-mantenimiento-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"panalcor-mantenimiento",
  storageBucket:"panalcor-mantenimiento.firebasestorage.app",
  messagingSenderId:"67593058609",
  appId:"1:67593058609:web:c33fa1fa4fce2932485810"
};
if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
const DB = firebase.database();

/* ══ ESTADO ══ */
const SESSION_KEY  = 'mecAuth_prev';
const MEC_KEY      = 'mecSeleccionado';
const PW_DEFAULT   = 'panalcor';
let mecActual      = null;
let planActivo     = null;
let planId         = null;

/* ══ LOGIN ══ */
function getMecPwd(cb){
  DB.ref('config/mecanicoPwd').once('value')
    .then(s => cb(s.val() || PW_DEFAULT))
    .catch(()=> cb(localStorage.getItem('mecanicoPwd') || PW_DEFAULT));
}

function doLogin(){
  const val = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  if(!val){ err.textContent='⚠️ Introduce la contraseña'; return; }
  getMecPwd(pwd => {
    if(val === pwd){
      sessionStorage.setItem(SESSION_KEY,'1');
      document.getElementById('loginScreen').style.display='none';
      mostrarSelectorMecanico();
    } else {
      err.textContent='❌ Contraseña incorrecta';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
    }
  });
}

/* ══ SELECTOR MECÁNICO ══ */
function getMecanicos(cb){
  DB.ref('config/mecanicos').once('value')
    .then(s => {
      const val = s.val();
      cb(val && val.length ? val : ['ALEX','RAFA','GREGORIO','JAVIER E','JAVIER H','RUBIEL','ALBERTO']);
    })
    .catch(() => cb(['ALEX','RAFA','GREGORIO','JAVIER E','JAVIER H','RUBIEL','ALBERTO']));
}

function mostrarSelectorMecanico(){
  const guardado = sessionStorage.getItem(MEC_KEY);
  if(guardado){
    mecActual = guardado;
    arrancarApp();
    return;
  }
  getMecanicos(mecanicos => {
    const div = document.getElementById('mecBtnList');
    div.innerHTML = mecanicos.map(m=>`
      <button class="mec-btn" onclick="seleccionarMecanico('${m}')">
        <span style="font-size:1.4rem">👷</span>
        <span>${m}</span>
      </button>`).join('');
    document.getElementById('mecSelector').style.display='flex';
  });
}

function seleccionarMecanico(nombre){
  mecActual = nombre;
  sessionStorage.setItem(MEC_KEY, nombre);
  document.getElementById('mecSelector').style.display='none';
  arrancarApp();
}

function cambiarMecanico(){
  sessionStorage.removeItem(MEC_KEY);
  mecActual = null;
  document.getElementById('app').style.display='none';
  mostrarSelectorMecanico();
}

/* ══ CARGAR PLAN ACTIVO ══ */
function arrancarApp(){
  document.getElementById('app').style.display='block';
  document.getElementById('hdrName').textContent = '👷 ' + mecActual;
  document.getElementById('tareasWrap').innerHTML = '<div class="empty-state"><div class="ico">⏳</div><p>Cargando tareas...</p></div>';

  DB.ref('plan_activo').once('value').then(snap => {
    const val = snap.val();
    if(!val || !val.id){
      document.getElementById('hdrPeriod').textContent = 'Sin plan activo';
      document.getElementById('tareasWrap').innerHTML = `
        <div class="empty-state">
          <div class="ico">📋</div>
          <p>No hay ningún plan activo.<br>El responsable debe crear uno desde el panel de administración.</p>
        </div>`;
      return;
    }
    planId = val.id;
    planActivo = val;
    document.getElementById('hdrPeriod').textContent = val.titulo || val.periodo || '—';
    renderTareas();

    // Escucha cambios en tiempo real
    DB.ref('plan_activo/tareas').on('value', snap2 => {
      if(planActivo) planActivo.tareas = snap2.val() || {};
      renderTareas();
    });
  }).catch(() => {
    document.getElementById('tareasWrap').innerHTML = `
      <div class="empty-state">
        <div class="ico">❌</div>
        <p>Error de conexión.<br>Comprueba que tienes internet.</p>
      </div>`;
  });
}

/* ══ RENDER TAREAS ══ */
function renderTareas(){
  if(!planActivo || !planActivo.tareas){
    document.getElementById('tareasWrap').innerHTML = `
      <div class="empty-state"><div class="ico">✅</div><p>No tienes tareas asignadas en el plan actual.</p></div>`;
    actualizarProgreso([]);
    return;
  }

  const misTareas = Object.values(planActivo.tareas)
    .filter(t => t.mecanico === mecActual);

  if(!misTareas.length){
    document.getElementById('tareasWrap').innerHTML = `
      <div class="empty-state"><div class="ico">✅</div><p>No tienes tareas asignadas en este plan.</p></div>`;
    actualizarProgreso([]);
    return;
  }

  // Agrupar por máquina
  const porMaquina = {};
  misTareas.forEach(t => {
    const k = t.maqId || t.maqNombre;
    if(!porMaquina[k]) porMaquina[k] = { nombre: t.maqNombre, tareas: [] };
    porMaquina[k].tareas.push(t);
  });

  actualizarProgreso(misTareas);

  const wrap = document.getElementById('tareasWrap');
  wrap.innerHTML = '';

  // Banner completado
  const allDone = misTareas.every(t => t.hecho);
  const banner = document.getElementById('bannerDone');
  banner.style.display = allDone ? 'block' : 'none';

  Object.entries(porMaquina).forEach(([k, maq]) => {
    const total = maq.tareas.length;
    const hechas = maq.tareas.filter(t => t.hecho).length;
    const allMaqDone = hechas === total;

    const card = document.createElement('div');
    card.className = 'maq-card' + (allMaqDone ? ' done' : '');
    card.dataset.key = k;

    let countClass = allMaqDone ? 'all-done' : hechas > 0 ? 'pending' : 'empty';
    let countTxt   = allMaqDone ? '✅ Completada' : `${hechas}/${total}`;

    card.innerHTML = `
      <div class="maq-header" onclick="toggleMaq(this.parentElement)">
        <div>
          <div class="maq-name">${maq.nombre}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="maq-count ${countClass}">${countTxt}</span>
          <span class="maq-arrow">▼</span>
        </div>
      </div>
      <div class="tareas-list">
        ${maq.tareas.map(t => `
          <div class="tarea-item ${t.hecho?'done':''}" id="ti_${t.id}" onclick="toggleTarea('${t.id}')">
            <div class="tarea-check">${t.hecho?'✓':''}</div>
            <div class="tarea-body">
              <div class="tarea-desc">${t.desc}</div>
              <div class="tarea-meta">${t.frecuencia||''}</div>
              ${t.hecho && t.hechoEn ? `<div class="tarea-done-info">✅ ${new Date(t.hechoEn).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>`;
    wrap.appendChild(card);

    // Auto-abrir si tiene pendientes
    if(!allMaqDone && hechas < total) {
      card.classList.add('open');
    }
  });
}

function toggleMaq(card){
  card.classList.toggle('open');
}

function toggleTarea(tareaId){
  if(!planActivo || !planActivo.tareas || !planActivo.tareas[tareaId]) return;
  const t = planActivo.tareas[tareaId];
  const nuevoEstado = !t.hecho;
  const ahora = Date.now();

  // Actualizar Firebase
  DB.ref(`plan_activo/tareas/${tareaId}`).update({
    hecho: nuevoEstado,
    hechoEn: nuevoEstado ? ahora : null,
    hechoBy: nuevoEstado ? mecActual : null
  }).catch(() => showToast('❌ Error al guardar'));

  // Actualizar local para respuesta inmediata
  t.hecho   = nuevoEstado;
  t.hechoEn = nuevoEstado ? ahora : null;
  t.hechoBy = nuevoEstado ? mecActual : null;

  showToast(nuevoEstado ? '✅ Tarea completada' : '↩️ Tarea desmarcada');
}

/* ══ PROGRESO ══ */
function actualizarProgreso(tareas){
  const total  = tareas.length;
  const hechas = tareas.filter(t => t.hecho).length;
  const pct    = total ? Math.round(hechas/total*100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressTxt').textContent = `${hechas} de ${total} tareas`;
  document.getElementById('progressPct').textContent  = pct + '%';
}

/* ══ TOAST ══ */
let toastT;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>t.classList.remove('show'), 2500);
}

/* ══ ARRANQUE ══ */
(function(){
  if(sessionStorage.getItem(SESSION_KEY)==='1'){
    document.getElementById('loginScreen').style.display='none';
    mostrarSelectorMecanico();
  }
})();
</script>
</body>
</html>
