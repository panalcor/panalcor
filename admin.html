function getPwd(){ return localStorage.getItem(PW_KEY) || 'admin'; }

function login(){
  const val = document.getElementById('pwInput').value;
  if(val === getPwd()){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();

    document.getElementById('loginErr').style.display = 'block';

}

  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';

}

function getAverias(){ return JSON.parse(localStorage.getItem('averias_v1')||'[]'); }

function getTurnos(){
  const keys = Object.keys(localStorage).filter(k=>k.startsWith('turno_'));
  return keys.map(k=>{ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }).filter(Boolean);
}

let charts = {};

function initApp(){
  renderDashboard();
  // fechas por defecto para mecánicos e informes (último mes)
  const hoy = new Date();
  const hace30 = new Date(hoy); hace30.setDate(hoy.getDate()-30);
  const fmt = d => d.toISOString().split('T')[0];
  ['mecDesde','infDesde'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=fmt(hace30); });
  ['mecHasta','infHasta'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=fmt(hoy); });
  renderEstadoDatos();
}

// ══════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════
function renderDashboard(){
  const av = getAverias();
  const turnos = getTurnos();
  const hoy = new Date();
  const mesActual = hoy.toISOString().substring(0,7);
  const avMes = av.filter(a=>a.fecha&&a.fecha.startsWith(mesActual));
  const totalMin = av.reduce((s,a)=>s+(a.tiempoMin||0),0);
  const totalMinMes = avMes.reduce((s,a)=>s+(a.tiempoMin||0),0);
  const pendientes = av.filter(a=>a.estado!=='RESUELTA').length;
  const turnMes = turnos.filter(t=>t.fecha&&t.fecha.startsWith(mesActual));
  const cumpl = turnMes.length ? Math.round(turnMes.reduce((s,t)=>s+(t.done/t.total),0)/turnMes.length*100) : null;

  // Máquina más averiada
  const maqCnt = {}; av.forEach(a=>{ maqCnt[a.maqNombre]=(maqCnt[a.maqNombre]||0)+1; });
  const topMaq = Object.entries(maqCnt).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi"><div class="kpi-num" style="color:var(--gold-light)">${av.length}</div><div class="kpi-label">Total averías</div><div class="kpi-sub">histórico</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--blue)">${avMes.length}</div><div class="kpi-label">Este mes</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--red)">${pendientes}</div><div class="kpi-label">Pendientes</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--yellow)">${Math.floor(totalMinMes/60)}h</div><div class="kpi-label">Parado este mes</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--green)">${cumpl!==null?cumpl+'%':'—'}</div><div class="kpi-label">Cumpl. mant.</div><div class="kpi-sub">este mes</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--purple);font-size:1.2rem;padding-top:6px">${topMaq?topMaq[0]:'—'}</div><div class="kpi-label">Más averiada</div><div class="kpi-sub">${topMaq?topMaq[1]+' averías':''}</div></div>
  `;

  // Charts
  renderChartTendencia(av);
  renderChartTipos(av);
  renderChartMaquinas(av);
  renderChartTurnos(av);

  // Alertas
  renderAlertasDash(av);

  // Últimas averías
  const tbody = document.getElementById('bUltimas');
  if(!av.length){ tbody.innerHTML='<tr><td colspan="7" class="no-data">Sin averías registradas</td></tr>'; return; }
  tbody.innerHTML = av.slice(0,10).map(a=>{
    const t = a.tiempoMin ? Math.floor(a.tiempoMin/60)+'h'+(a.tiempoMin%60?''+a.tiempoMin%60+'m':'') : '—';
    const est = a.estado==='RESUELTA'?'badge-green':a.estado==='EN CURSO'?'badge-red':'badge-yellow';
    return `<tr>
      <td>${a.fecha||'—'}</td>
      <td><b>${a.maqNombre||'—'}</b></td>
      <td>${a.parte||'—'}</td>
      <td>${a.tipo||'—'}</td>
      <td>${(a.mecanicos||[]).join(', ')||'—'}</td>
      <td>${t}</td>
      <td><span class="badge ${est}">${a.estado||'—'}</span></td>
    </tr>`;
  }).join('');
}

function renderAlertasDash(av){
  const el = document.getElementById('alertasDash');
  const alertas = [];
  const pendientes = av.filter(a=>a.estado!=='RESUELTA');
  if(pendientes.length>0){
    const criticas = pendientes.filter(a=>a.gravedad==='CRÍTICA');
    if(criticas.length) alertas.push({tipo:'red',icon:'🚨',title:`${criticas.length} avería${criticas.length>1?'s':''} CRÍTICA${criticas.length>1?'S':''} sin resolver`,text:`Máquinas: ${criticas.map(a=>a.maqNombre).join(', ')}`});
    if(pendientes.length>criticas.length) alertas.push({tipo:'warn',icon:'⚠️',title:`${pendientes.length-criticas.length} avería${pendientes.length-criticas.length>1?'s':''} pendiente${pendientes.length-criticas.length>1?'s':''}`,text:'Requieren atención'});
  }
  const hace90=Date.now()-90*24*3600*1000;
  const recMap={};
  av.filter(a=>a.ts>hace90).forEach(a=>{
    const k=a.maqId+'|'+a.parte;
    if(!recMap[k]) recMap[k]={maq:a.maqNombre,parte:a.parte,cnt:0};
    recMap[k].cnt++;
  });
  const recs=Object.values(recMap).filter(r=>r.cnt>=3);
  if(recs.length) alertas.push({tipo:'red',icon:'🔄',title:`${recs.length} avería${recs.length>1?'s':''} recurrente${recs.length>1?'s':''}`,text:recs.map(r=>`${r.maq} — ${r.parte||'S/P'} (${r.cnt}×)`).join(' | ')});
  if(!alertas.length) alertas.push({tipo:'ok',icon:'✅',title:'Todo bajo control',text:'No hay alertas críticas en este momento'});
  el.innerHTML=alertas.map(a=>`<div class="alert-item ${a.tipo==='warn'?'alert-warn':a.tipo==='ok'?'alert-ok':''}">
    <div class="ai-icon">${a.icon}</div>
    <div class="ai-text"><div class="ai-title">${a.title}</div>${a.text}</div>
  </div>`).join('');
}

function renderChartTendencia(av){
  const meses={};
  av.forEach(a=>{ const k=a.fecha?a.fecha.substring(0,7):''; if(k) meses[k]=(meses[k]||0)+1; });
  const keys=Object.keys(meses).sort().slice(-12);
  destroyChart('cTendencia');
  charts.cTendencia=new Chart(document.getElementById('cTendencia'),{
    type:'line',
    data:{labels:keys,datasets:[{data:keys.map(k=>meses[k]),borderColor:'rgba(201,162,39,0.9)',backgroundColor:'rgba(201,162,39,0.12)',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:'var(--gold)'}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888',font:{size:10}}},y:{ticks:{color:'#888'},grid:{color:'rgba(255,255,255,0.06)'}}}}
  });
}

function renderChartTipos(av){
  const tipos={};
  av.forEach(a=>{ if(a.tipo) tipos[a.tipo]=(tipos[a.tipo]||0)+1; });
  destroyChart('cTipos');
  if(!Object.keys(tipos).length) return;
  charts.cTipos=new Chart(document.getElementById('cTipos'),{
    type:'doughnut',
    data:{labels:Object.keys(tipos),datasets:[{data:Object.values(tipos),backgroundColor:['#3498db','#f1c40f','#1abc9c','#9b59b6','#e67e22','#95a5a6']}]},
    options:{maintainAspectRatio:false,plugins:{legend:{labels:{color:'#ccc',font:{size:10}}}}}
  });
}

function renderChartMaquinas(av){
  const maqCnt={};
  av.forEach(a=>{ maqCnt[a.maqNombre]=(maqCnt[a.maqNombre]||0)+1; });
  const top=Object.entries(maqCnt).sort((a,b)=>b[1]-a[1]).slice(0,10);
  destroyChart('cMaquinas');
  if(!top.length) return;
  charts.cMaquinas=new Chart(document.getElementById('cMaquinas'),{
    type:'bar',
    data:{labels:top.map(e=>e[0]),datasets:[{data:top.map(e=>e[1]),backgroundColor:'rgba(231,76,60,0.65)',borderColor:'rgba(231,76,60,1)',borderWidth:1}]},
    options:{maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888'},grid:{color:'rgba(255,255,255,0.06)'}},y:{ticks:{color:'#ccc',font:{size:10}}}}}
  });
}

function renderChartTurnos(av){
  const t={MAÑANA:0,TARDE:0,NOCHE:0};
  av.forEach(a=>{ if(a.turno){ const k=a.turno.split(' ')[0]; if(t[k]!==undefined) t[k]++; }});
  destroyChart('cTurnos');
  charts.cTurnos=new Chart(document.getElementById('cTurnos'),{
    type:'pie',
    data:{labels:['Mañana','Tarde','Noche'],datasets:[{data:[t.MAÑANA,t.TARDE,t.NOCHE],backgroundColor:['#f1c40f','#e67e22','#3498db']}]},
    options:{maintainAspectRatio:false,plugins:{legend:{labels:{color:'#ccc'}}}}
  });
}

function destroyChart(id){ if(charts[id]){charts[id].destroy();delete charts[id];} }

// ══════════════════════════════════════════════════
// MECÁNICOS
// ══════════════════════════════════════════════════
function renderMecanicos(){
  const av = getAverias();
  const turnos = getTurnos();
  const desde = document.getElementById('mecDesde').value;
  const hasta = document.getElementById('mecHasta').value;

  const avFilt = av.filter(a=>(!desde||a.fecha>=desde)&&(!hasta||a.fecha<=hasta));
  const tFilt  = turnos.filter(t=>(!desde||t.fecha>=desde)&&(!hasta||t.fecha<=hasta));

  // Reunir todos los mecánicos mencionados
  const mecSet = new Set();
  avFilt.forEach(a=>(a.mecanicos||[]).forEach(m=>mecSet.add(m)));
  tFilt.forEach(t=>{ if(t.mecanico) mecSet.add(t.mecanico); });

  if(!mecSet.size){
    document.getElementById('mecCards').innerHTML='<div class="no-data" style="grid-column:1/-1">Sin datos en el periodo seleccionado</div>';
    destroyChart('cMecanicos'); return;
  }

  const stats = {};
  mecSet.forEach(m=>{
    const avMec = avFilt.filter(a=>(a.mecanicos||[]).includes(m));
    const tMec  = tFilt.filter(t=>t.mecanico===m);
    const totalMin = avMec.reduce((s,a)=>s+(a.tiempoMin||0),0);
    const avgMin   = avMec.length ? Math.round(totalMin/avMec.length) : 0;
    const turnosDone = tMec.reduce((s,t)=>s+t.done,0);
    const turnosTotal= tMec.reduce((s,t)=>s+t.total,0);
    const cumpl = turnosTotal ? Math.round(turnosDone/turnosTotal*100) : null;
    const tipos = {}; avMec.forEach(a=>{ if(a.tipo) tipos[a.tipo]=(tipos[a.tipo]||0)+1; });
    const topTipo = Object.entries(tipos).sort((a,b)=>b[1]-a[1])[0];
    stats[m] = { intervenciones:avMec.length, totalMin, avgMin, turnosTotales:tMec.length, cumpl, topTipo };
  });

  const maxInt = Math.max(...Object.values(stats).map(s=>s.intervenciones),1);

  document.getElementById('mecCards').innerHTML = Object.entries(stats).sort((a,b)=>b[1].intervenciones-a[1].intervenciones).map(([m,s])=>{
    const th = Math.floor(s.totalMin/60), tm = s.totalMin%60;
    const at = Math.floor(s.avgMin/60), am = s.avgMin%60;
    const pct = Math.round(s.intervenciones/maxInt*100);
    return `<div class="mec-card">
      <div class="mec-card-name">👷 ${m}</div>
      <div class="mec-stat"><span class="label">Intervenciones</span><span class="value">${s.intervenciones}</span></div>
      <div class="mec-stat"><span class="label">Tiempo total reparando</span><span class="value">${th}h ${tm}min</span></div>
      <div class="mec-stat"><span class="label">Tiempo medio/avería</span><span class="value">${at}h ${am}min</span></div>
      <div class="mec-stat"><span class="label">Turnos completados</span><span class="value">${s.turnosTotales}</span></div>
      ${s.cumpl!==null?`<div class="mec-stat"><span class="label">Cumplimiento tareas</span><span class="value" style="color:${s.cumpl>=80?'var(--green)':s.cumpl>=60?'var(--yellow)':'var(--red)'}">${s.cumpl}%</span></div>`:''}
      ${s.topTipo?`<div class="mec-stat"><span class="label">Tipo más frecuente</span><span class="value">${s.topTipo[0]}</span></div>`:''}
      <div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></div>
    </div>`;
  }).join('');

  // Chart mecánicos
  const entries = Object.entries(stats).sort((a,b)=>b[1].intervenciones-a[1].intervenciones);
  destroyChart('cMecanicos');
  charts.cMecanicos = new Chart(document.getElementById('cMecanicos'),{
    type:'bar',
    data:{
      labels:entries.map(e=>e[0]),
      datasets:[
        {label:'Intervenciones',data:entries.map(e=>e[1].intervenciones),backgroundColor:'rgba(201,162,39,0.7)'},
        {label:'Turnos',data:entries.map(e=>e[1].turnosTotales),backgroundColor:'rgba(52,152,219,0.5)'}
      ]
    },
    options:{maintainAspectRatio:false,plugins:{legend:{labels:{color:'#ccc'}}},scales:{x:{ticks:{color:'#ccc'}},y:{ticks:{color:'#888'},grid:{color:'rgba(255,255,255,0.06)'}}}}
  });
}

let informeGenerado = '';

function generarInforme(){
  const btn = document.getElementById('iaBtnGenerar');
  const loading = document.getElementById('iaLoading');
  const output = document.getElementById('iaOutput');
  btn.disabled = true;
  loading.style.display = 'block';
  output.style.display = 'none';

  setTimeout(()=>{
    informeGenerado = analizarDatos();
    loading.style.display = 'none';
    output.style.display = 'block';

    document.getElementById('iaCopyBtn').style.display = 'inline-flex';
    document.getElementById('iaExportBtn').style.display = 'inline-flex';
    showToast('🤖 Informe generado');
  }, 800);
}

function analizarDatos(){
  const av = getAverias();
  const turnos = getTurnos();
  const fecha = new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const linea = '═'.repeat(52);
  const sep   = '─'.repeat(52);
  let r = '';

  r += `${linea}\n`;
  r += `  INFORME DE ANÁLISIS INTELIGENTE — PANALCOR S.L.\n`;
  r += `  ${fecha.toUpperCase()}\n`;
  r += `${linea}\n\n`;

  if(!av.length && !turnos.length){
    r += 'Sin datos registrados todavía. Registra averías y turnos para obtener análisis.\n';
    return r;
  }

  // ── RESUMEN ──
  const totalMin = av.reduce((s,a)=>s+(a.tiempoMin||0),0);
  const pendientes = av.filter(a=>a.estado!=='RESUELTA');
  const hoy = new Date(); const mesK = hoy.toISOString().substring(0,7);
  const avMes = av.filter(a=>a.fecha&&a.fecha.startsWith(mesK));
  r += `📊 RESUMEN EJECUTIVO\n${sep}\n`;
  r += `Total averías registradas:    ${av.length}\n`;
  r += `Tiempo total de parada:       ${Math.floor(totalMin/60)}h ${totalMin%60}min\n`;
  r += `Averías este mes:             ${avMes.length}\n`;
  r += `Sin resolver actualmente:     ${pendientes.length}\n`;
  r += `Turnos de mantenimiento:      ${turnos.length}\n`;
  if(turnos.length){
    const done = turnos.reduce((s,t)=>s+t.done,0);
    const total = turnos.reduce((s,t)=>s+t.total,0);
    r += `Cumplimiento global tareas:   ${Math.round(done/total*100)}%\n`;
  }
  r += '\n';

  // ── ALERTAS CRÍTICAS ──
  const criticas = pendientes.filter(a=>a.gravedad==='CRÍTICA'||a.gravedad==='ALTA');
  if(criticas.length){
    r += `🚨 ALERTAS CRÍTICAS\n${sep}\n`;
    criticas.forEach(a=>{ r += `• [${a.gravedad}] ${a.maqNombre} — ${a.parte||'sin parte'} (${a.fecha})\n  Descripción: ${a.descripcion?a.descripcion.substring(0,80):'—'}\n`; });
    r += '\n';
  }

  // ── RECURRENCIAS ──
  const hace90=Date.now()-90*24*3600*1000;
  const recMap={};
  av.filter(a=>a.ts>hace90).forEach(a=>{
    const k=a.maqId+'|'+a.parte;
    if(!recMap[k]) recMap[k]={maq:a.maqNombre,parte:a.parte,cnt:0,totalMin:0};
    recMap[k].cnt++; recMap[k].totalMin+=(a.tiempoMin||0);
  });
  const recs=Object.values(recMap).filter(r=>r.cnt>=3).sort((a,b)=>b.cnt-a.cnt);
  if(recs.length){
    r += `🔄 AVERÍAS RECURRENTES (últimos 90 días)\n${sep}\n`;
    recs.forEach(rec=>{
      r += `• ${rec.maq} — ${rec.parte||'sin parte'}: ${rec.cnt} fallos · ${Math.floor(rec.totalMin/60)}h parado\n`;
      r += `  → ${rec.cnt>=5?'CRÍTICO: Sustituir componente o revisar diseño':'Implementar mantenimiento preventivo de este elemento'}\n`;
    });
    r += '\n';
  }

  // ── MÁQUINAS ──
  if(av.length){
    const maqStats={};
    av.forEach(a=>{
      if(!maqStats[a.maqNombre]) maqStats[a.maqNombre]={cnt:0,min:0,fechas:[]};
      maqStats[a.maqNombre].cnt++;
      maqStats[a.maqNombre].min+=(a.tiempoMin||0);
      if(a.fecha) maqStats[a.maqNombre].fechas.push(a.fecha);
    });
    const top=Object.entries(maqStats).sort((a,b)=>b[1].cnt-a[1].cnt).slice(0,5);
    r += `🔧 TOP 5 MÁQUINAS MÁS AVERIADAS\n${sep}\n`;
    top.forEach(([maq,s],i)=>{
      const mttr = s.cnt>0 ? Math.round(s.min/s.cnt) : 0;
      let mtbf = '—';
      if(s.fechas.length>=2){
        const fs=s.fechas.sort(); const dias=Math.round((new Date(fs[fs.length-1])-new Date(fs[0]))/(86400000));
        mtbf = (dias/(s.cnt-1)).toFixed(1)+' días';
      }
      r += `${i+1}. ${maq}: ${s.cnt} averías · MTTR ${Math.floor(mttr/60)}h${mttr%60}min · MTBF ${mtbf}\n`;
    });
    if(top.length) r += `\n→ Priorizar revisión preventiva de: ${top[0][0]}\n`;
    r += '\n';

    // Detectar deterioro (MTBF decreciente)
    const deterioro=[];
    Object.entries(maqStats).forEach(([maq,s])=>{
      if(s.fechas.length>=4){
        const fs=s.fechas.sort();
        const mitad=Math.floor(fs.length/2);
        const diasPrimera=Math.round((new Date(fs[mitad-1])-new Date(fs[0]))/(86400000));
        const diasSegunda=Math.round((new Date(fs[fs.length-1])-new Date(fs[mitad]))/(86400000));
        const mtbf1=diasPrimera/(mitad); const mtbf2=diasSegunda/(fs.length-1-mitad)||1;
        if(mtbf2<mtbf1*0.7) deterioro.push({maq,mejora:Math.round((1-mtbf2/mtbf1)*100)});
      }
    });
    if(deterioro.length){
      r += `📉 MÁQUINAS EN DETERIORO (MTBF empeorando)\n${sep}\n`;
      deterioro.forEach(d=>{ r += `• ${d.maq}: frecuencia de fallos aumentó un ${d.mejora}%\n→ Inspección técnica urgente recomendada\n`; });
      r += '\n';
    }
  }

  // ── TURNOS ──
  const turnMap={MAÑANA:0,TARDE:0,NOCHE:0};
  av.forEach(a=>{ if(a.turno){const k=a.turno.split(' ')[0];if(turnMap[k]!==undefined)turnMap[k]++;}});
  if(Object.values(turnMap).some(v=>v>0)){
    r += `⏰ ANÁLISIS POR TURNO\n${sep}\n`;
    const total=Object.values(turnMap).reduce((s,v)=>s+v,0);
    Object.entries(turnMap).sort((a,b)=>b[1]-a[1]).forEach(([t,c])=>{
      if(c>0){ const bars='█'.repeat(Math.min(Math.round(c/total*20),20)); r += `${t.padEnd(8)}: ${bars.padEnd(20)} ${c} (${Math.round(c/total*100)}%)\n`; }
    });
    const peor=Object.entries(turnMap).sort((a,b)=>b[1]-a[1])[0];
    if(peor[1]>0) r += `\n→ El turno ${peor[0]} concentra más averías. Revisar carga de trabajo y condiciones.\n`;
    r += '\n';
  }

  // ── MECÁNICOS ──
  const mecStats={};
  av.forEach(a=>{
    (a.mecanicos||[]).forEach(m=>{
      if(!mecStats[m]) mecStats[m]={cnt:0,min:0};
      mecStats[m].cnt++; mecStats[m].min+=(a.tiempoMin||0);
    });
  });
  if(Object.keys(mecStats).length){
    r += `👷 ANÁLISIS POR MECÁNICO\n${sep}\n`;
    const sorted=Object.entries(mecStats).sort((a,b)=>b[1].cnt-a[1].cnt);
    sorted.forEach(([m,s])=>{
      const avg=s.cnt?Math.round(s.min/s.cnt):0;
      r += `• ${m}: ${s.cnt} intervenciones · tiempo medio ${Math.floor(avg/60)}h ${avg%60}min\n`;
    });
    if(sorted.length>=2){
      const fastest=sorted.reduce((a,b)=>(a[1].min/a[1].cnt||999)<(b[1].min/b[1].cnt||999)?a:b);
      r += `\n→ Menor tiempo medio de reparación: ${fastest[0]}\n`;
    }
    r += '\n';
  }

  // ── TIPOS ──
  const tipoMap={};
  av.forEach(a=>{ if(a.tipo) tipoMap[a.tipo]=(tipoMap[a.tipo]||0)+1; });
  if(Object.keys(tipoMap).length){
    r += `⚙️ TIPOS DE AVERÍA\n${sep}\n`;
    const tot=av.length;
    Object.entries(tipoMap).sort((a,b)=>b[1]-a[1]).forEach(([t,c])=>{
      const bars='█'.repeat(Math.min(Math.round(c/tot*20),20));
      r += `${t.padEnd(14)}: ${bars.padEnd(20)} ${c} (${Math.round(c/tot*100)}%)\n`;
    });
    r += '\n';
  }

  // ── REPUESTOS ──
  const repMap={};
  av.forEach(a=>{
    (a.materiales||[]).forEach(m=>{
      if(!repMap[m.desc]) repMap[m.desc]={desc:m.desc,ref:m.ref,cnt:0,qty:0};
      repMap[m.desc].cnt++; repMap[m.desc].qty+=(m.qty||1);
    });
  });
  const topRep=Object.values(repMap).sort((a,b)=>b.cnt-a.cnt).slice(0,8);
  if(topRep.length){
    r += `📦 REPUESTOS MÁS UTILIZADOS\n${sep}\n`;
    topRep.forEach((rep,i)=>{ r += `${i+1}. ${rep.desc} (${rep.ref}): ${rep.cnt} veces · ${rep.qty} uds totales\n`; });
    r += `\n→ Asegura stock mínimo de: ${topRep.slice(0,3).map(r=>r.desc).join(', ')}\n`;
    r += '\n';
  }

  // ── CAUSAS ──
  const causaMap={};
  av.forEach(a=>{ if(a.causa) causaMap[a.causa]=(causaMap[a.causa]||0)+1; });
  if(Object.keys(causaMap).length){
    r += `🔍 CAUSAS RAÍZ MÁS FRECUENTES\n${sep}\n`;
    Object.entries(causaMap).sort((a,b)=>b[1]-a[1]).forEach(([c,n])=>{ r += `• ${c}: ${n} caso${n>1?'s':''}\n`; });
    const topCausa=Object.entries(causaMap).sort((a,b)=>b[1]-a[1])[0];
    if(topCausa) r += `\n→ La causa "${topCausa[0]}" es la más frecuente. Revisar plan de mantenimiento preventivo.\n`;
    r += '\n';
  }

  // ── MANTENIMIENTOS ──
  if(turnos.length){
    const bajoCumplimiento=turnos.filter(t=>t.done/t.total<0.7);
    if(bajoCumplimiento.length){
      r += `📋 TURNOS CON BAJO CUMPLIMIENTO (<70%)\n${sep}\n`;
      bajoCumplimiento.slice(0,5).forEach(t=>{ r += `• ${t.fecha} ${t.turno} — ${t.mecanico}: ${t.done}/${t.total} tareas (${Math.round(t.done/t.total*100)}%)\n`; });
      r += '\n';
    }
  }

  // ── RECOMENDACIONES ──
  const recomend=[];
  if(recs.length) recomend.push(`Plan de mantenimiento preventivo para: ${recs.slice(0,3).map(r=>r.maq+' ('+r.parte+')').join(', ')}`);
  if(pendientes.length>3) recomend.push(`Resolver urgentemente las ${pendientes.length} averías abiertas`);
  if(topRep.length) recomend.push(`Asegurar stock de los repuestos más usados: ${topRep.slice(0,2).map(r=>r.desc).join(', ')}`);
  if(avMes.length>5) recomend.push(`Alta actividad este mes (${avMes.length} averías). Revisar plan de mantenimiento general`);
  if(!recomend.length && av.length>0) recomend.push('El sistema está bajo control. Continuar con el plan de mantenimiento actual');
  if(!recomend.length) recomend.push('Registra más datos para obtener recomendaciones personalizadas');

  r += `💡 RECOMENDACIONES\n${sep}\n`;
  recomend.forEach((rec,i)=>{ r += `${i+1}. ${rec}\n`; });

  r += `\n${linea}\n`;
  r += `Sistema de Análisis Inteligente PANALCOR v1.0\n`;
  r += `${linea}\n`;
  return r;
}

function getAvFiltradas(){
  const av=getAverias();
  const desde=document.getElementById('infDesde').value;
  const hasta=document.getElementById('infHasta').value;
  const est=document.getElementById('infEstado').value;
  return av.filter(a=>(!desde||a.fecha>=desde)&&(!hasta||a.fecha<=hasta)&&(!est||a.estado===est));
}

function renderResumenMensual(){
  const av=getAverias();
  const meses={};
  av.forEach(a=>{
    const k=a.fecha?a.fecha.substring(0,7):'';
    if(!k) return;
    if(!meses[k]) meses[k]={cnt:0,min:0,res:0,pend:0,mecs:{}};
    meses[k].cnt++;
    meses[k].min+=(a.tiempoMin||0);
    if(a.estado==='RESUELTA') meses[k].res++; else meses[k].pend++;
    (a.mecanicos||[]).forEach(m=>{ meses[k].mecs[m]=(meses[k].mecs[m]||0)+1; });
  });
  const tbody=document.getElementById('bMensual');
  const keys=Object.keys(meses).sort().reverse();
  if(!keys.length){tbody.innerHTML='<tr><td colspan="6" class="no-data">Sin datos</td></tr>';return;}
  tbody.innerHTML=keys.map(k=>{
    const d=meses[k];
    const topMec=Object.entries(d.mecs).sort((a,b)=>b[1]-a[1])[0];
    return `<tr>
      <td><b>${k}</b></td><td>${d.cnt}</td>
      <td>${Math.floor(d.min/60)}h ${d.min%60}min</td>
      <td><span class="badge badge-green">${d.res}</span></td>
      <td><span class="badge badge-yellow">${d.pend}</span></td>
      <td>${topMec?topMec[0]+'('+topMec[1]+')':'—'}</td>
    </tr>`;
  }).join('');
}

function renderRepuestosUsados(){
  const av=getAverias();
  const repMap={};
  av.forEach(a=>{ (a.materiales||[]).forEach(m=>{ if(!repMap[m.desc]) repMap[m.desc]={desc:m.desc,ref:m.ref,cnt:0,qty:0}; repMap[m.desc].cnt++; repMap[m.desc].qty+=(m.qty||1); }); });
  const sorted=Object.values(repMap).sort((a,b)=>b.cnt-a.cnt).slice(0,20);
  const tbody=document.getElementById('bRepuestos');
  if(!sorted.length){tbody.innerHTML='<tr><td colspan="4" class="no-data">No hay materiales registrados</td></tr>';return;}
  tbody.innerHTML=sorted.map(r=>`<tr><td>${r.desc}</td><td><code>${r.ref}</code></td><td>${r.cnt}</td><td>${r.qty}</td></tr>`).join('');
}

function descargarBackup(){
  showToast('⏳ Preparando copia de seguridad...');
  // Leer todo de Firebase
  Promise.all([
    DB.ref('averias').once('value'),
    DB.ref('maquinas_extra').once('value')
  ]).then(([snapAv, snapMaq])=>{
    const backup = {
      _version:   1,
      _fecha:     new Date().toISOString(),
      _app:       'PANALCOR Mantenimiento',
      averias:    snapAv.val()    || {},
      maquinas_extra: snapMaq.val() || {}
    };
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const fecha = new Date().toISOString().split('T')[0];
    a.href     = url;
    a.download = `panalcor_backup_${fecha}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ Copia de seguridad descargada');
  }).catch(()=>{
    showToast('❌ Error al conectar con la nube. ¿Tienes internet?');
  });
}

function restaurarBackup(input){
  const file = input.files[0];
  if(!file) return;
  document.getElementById('backupFileName').textContent = file.name;

  const reader = new FileReader();
  reader.onload = function(e){
    let backup;
    try{
      backup = JSON.parse(e.target.result);
    } catch(err){
      showToast('❌ El fichero no es válido');
      return;
    }
    if(!backup._app || backup._app !== 'PANALCOR Mantenimiento'){
      showToast('❌ Este fichero no es una copia de PANALCOR');
      return;
    }
    const totalAverias = Object.keys(backup.averias||{}).length;
    const fechaBackup  = backup._fecha ? new Date(backup._fecha).toLocaleString('es-ES') : 'desconocida';
    if(!confirm(
      `¿Restaurar esta copia de seguridad?\n\n` +
      `📅 Fecha de la copia: ${fechaBackup}\n` +
      `📋 Averías: ${totalAverias}\n\n` +
      `⚠️ Los datos actuales serán sustituidos por los de la copia.\n` +
      `Esta acción no se puede deshacer.`
    )) {
      input.value = '';
      document.getElementById('backupFileName').textContent = '';
      return;
    }
    showToast('⏳ Restaurando datos...');
    Promise.all([
      DB.ref('averias').set(backup.averias || {}),
      DB.ref('maquinas_extra').set(backup.maquinas_extra || {})
    ]).then(()=>{
      // Actualizar localStorage también
      const avArray = Object.values(backup.averias||{}).sort((a,b)=>b.ts-a.ts);
      localStorage.setItem('averias_v1', JSON.stringify(avArray));
      showToast(`✅ Restauradas ${totalAverias} averías correctamente`);
      renderDashboard();
      renderEstadoDatos();
      input.value = '';
      document.getElementById('backupFileName').textContent = '';
    }).catch(()=>{
      showToast('❌ Error al restaurar. Comprueba la conexión.');
    });
  };
  reader.readAsText(file);
}

let maquinasExtra = [];

function loadMaquinasExtra(callback){

function saveMaquinasExtra(){
  const obj = {};
  maquinasExtra.forEach(m=>{ obj[m.id] = m; });
  DB.ref('maquinas_extra').set(obj).catch(()=>{});
}

function renderMaquinas(){
  // Rellenar datalists con tipos y áreas de las máquinas base
  const BASE_TIPOS = ['AMASADORA','FORMADORA-ENTABLADORA','CARRUSEL','VOLCADOR','REPARTIDOR','DIVISORAS','CAMARA REPOSO','EMBOLADORA','FERMENTADORA','HORNO','TALLADORA','TUNEL','FORMADORA CAJAS','EMBOLSADORA','CARGADOR/DESCARGADOR','DESMOLDEO','CONTADORA','IMPRESORA','C. RODILLOS','PRECINTADORA','M. PEGATINAS','ROBOT','ENFARDADORA','SILOS HARINA','ADITIVOS','LEVADURA'];
  const BASE_AREAS = ['OBRADOR','HORNOS','TUNELES','ENVASADO','SILOS','FERMENTADORA','TRUENO-FERMENTADORA'];
  document.getElementById('maqTiposList').innerHTML = BASE_TIPOS.map(t=>`<option value="${t}">`).join('');
  document.getElementById('maqAreasList').innerHTML = BASE_AREAS.map(a=>`<option value="${a}">`).join('');

  const count = maquinasExtra.length;
  document.getElementById('maqExtraCount').textContent = count ? `${count} máquina${count>1?'s':''} añadida${count>1?'s':''}` : 'Sin máquinas personalizadas';

  const tbody = document.getElementById('bMaquinasExtra');
  if(!count){
    tbody.innerHTML='<tr><td colspan="7" class="no-data">Aún no has añadido ninguna máquina extra</td></tr>';
    return;
  }
  tbody.innerHTML = maquinasExtra.map(m=>`<tr>
    <td><code style="color:var(--gold);font-size:0.8rem">${m.id}</code></td>
    <td><b>${m.n}</b></td>
    <td><span class="badge badge-blue" style="font-size:0.7rem">${m.t}</span></td>
    <td style="color:rgba(255,255,255,0.6)">${m.f||'—'}</td>
    <td>${m.a}</td>
    <td><span class="badge ${m.c==='A'?'badge-red':m.c==='B'?'badge-yellow':'badge-blue'}">${m.c||'—'}</span></td>
    <td><button onclick="eliminarMaquina('${m.id}')" style="background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.4);color:var(--red);border-radius:5px;padding:4px 10px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:0.8rem;transition:all .2s" onmouseover="this.style.background='rgba(231,76,60,0.3)'" onmouseout="this.style.background='rgba(231,76,60,0.15)'">🗑 Eliminar</button></td>
  </tr>`).join('');
}

function guardarMaquina(){
  const n = document.getElementById('maqN').value.trim().toUpperCase();
  const t = document.getElementById('maqT').value.trim().toUpperCase();
  const f = document.getElementById('maqF').value.trim().toUpperCase();
  const a = document.getElementById('maqA').value.trim().toUpperCase();
  const c = document.getElementById('maqC').value;
  if(!n||!t||!a){ showToast('⚠️ Nombre, tipo y área son obligatorios'); return; }

  // Calcular siguiente ID (por encima de todos los existentes base + extra)
  const BASE_MAX = 129;
  const extraNums = maquinasExtra.map(m=>parseInt(m.id.replace('MAQ-',''))||0);
  const nextNum = Math.max(BASE_MAX, ...extraNums) + 1;
  const id = 'MAQ-' + String(nextNum).padStart(3,'0');

  maquinasExtra.push({id, n, t, f, a, c});
  saveMaquinasExtra();
  renderMaquinas();

  document.getElementById('maqN').value='';

let personalData = [];

function loadPersonal(callback){
  DB.ref('config/personal').once('value').then(snap=>{
    const val = snap.val();
    if(val && Array.isArray(val) && val.length){
      personalData = val;
    } else {
      // Primera carga: guardar los datos del Excel como base
      personalData = PERSONAL_DEFAULT;
      syncPersonalFirebase();
    }
    if(callback) callback();
  }).catch(()=>{ personalData = PERSONAL_DEFAULT; if(callback) callback(); });
}

function syncPersonalFirebase(){
  // Guarda lista completa y también el array de nombres activos para los selectores
  DB.ref('config/personal').set(personalData);
  const activos = personalData.filter(m=>m.estado==='ACTIVO').map(m=>m.nombre);

function guardarPersonal(){
  const nombre = document.getElementById('pmNombre').value.trim().toUpperCase();
  if(!nombre){ showToast('⚠️ El nombre es obligatorio'); return; }
  const editId = document.getElementById('pmEditId').value;
  const dato = {
    id:       editId || generarIdPersonal(),
    nombre,
    turno:    document.getElementById('pmTurno').value,
    espec:    document.getElementById('pmEspec').value,
    estado:   document.getElementById('pmEstado').value,
    pwd:      document.getElementById('pmPwd').value.trim(),
    notas:    document.getElementById('pmNotas').value.trim()
  };
  if(editId){
    const idx = personalData.findIndex(m=>m.id===editId);
    if(idx>=0) personalData[idx]=dato;
  } else {
    personalData.push(dato);
  }
  syncPersonalFirebase();
  renderPersonal();
  cancelarEditarPersonal();
  showToast(editId ? '✅ Mecánico actualizado' : '✅ Mecánico añadido');
}

function generarIdPersonal(){
  const nums = personalData.map(m=>parseInt(m.id.replace('MEC-',''))||0);
  const max = nums.length ? Math.max(...nums) : 0;
  return 'MEC-'+String(max+1).padStart(3,'0');
}

function editarPersonal(id){
  const m = personalData.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('pmNombre').value  = m.nombre;
  document.getElementById('pmTurno').value   = m.turno||'';
  document.getElementById('pmEspec').value   = m.espec||'';
  document.getElementById('pmEstado').value  = m.estado||'ACTIVO';
  document.getElementById('pmPwd').value     = m.pwd||'';
  document.getElementById('pmNotas').value   = m.notas||'';
  document.getElementById('pmEditId').value  = m.id;
  document.getElementById('mecFormTitle').textContent = '✏️ EDITANDO: '+m.nombre;
  document.getElementById('mecFormWrap').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function cancelarEditarPersonal(){
  ['pmNombre','pmTurno','pmEspec','pmPwd','pmNotas'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.value='';
  });
  document.getElementById('pmEstado').value = 'ACTIVO';
  document.getElementById('pmEditId').value = '';
  document.getElementById('mecFormTitle').textContent = '➕ NUEVO MECÁNICO';
}

function eliminarPersonal(id){
  const m = personalData.find(x=>x.id===id);
  if(!m) return;
  if(!confirm('¿Eliminar a '+m.nombre+'? Esta acción no se puede deshacer.')) return;
  personalData = personalData.filter(x=>x.id!==id);
  syncPersonalFirebase();
  renderPersonal();
  showToast('🗑️ '+m.nombre+' eliminado');
}

function proximaFecha(ultimaISO, frecuencia){
  var m = FREQ_MESES[frecuencia];
  if(!m || !ultimaISO) return null;
  var d = new Date(ultimaISO);
  d.setMonth(d.getMonth() + m);
  return d;

function estadoAlarma(proxima){
  if(!proxima) return {tipo:'SIN_FECHA', dias:null};
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var dias = Math.round((proxima - hoy) / 86400000);
  if(dias < 0)  return {tipo:'VENCIDA',  dias: Math.abs(dias)};
  if(dias <= 15) return {tipo:'PROXIMA',  dias: dias};
  return {tipo:'OK', dias: dias};
}

    var alarmas = PERIODIC_TASKS.map(function(t){
      var rec = ur[t.id] || {};
      var proxima = proximaFecha(rec.fecha || null, t.frecuencia);
      var estado  = estadoAlarma(proxima);
      return {task:t, ultima:rec.fecha||null, proxima:proxima, estado:estado};
    });
    renderAlarmasResumen(alarmas);
  }).catch(function(){ renderAlarmasResumen(null); });
}

function renderAlarmasResumen(alarmas){
  var el = document.getElementById('alarmasResumen');
  if(!el) return;
  if(!alarmas){ el.innerHTML='<span style="color:rgba(255,255,255,0.3)">Sin datos</span>'; return; }
  var vencidas = alarmas.filter(function(a){ return a.estado.tipo==='VENCIDA'; });
  var proximas = alarmas.filter(function(a){ return a.estado.tipo==='PROXIMA'; });
  var sinFecha = alarmas.filter(function(a){ return a.estado.tipo==='SIN_FECHA'; });
  var ok       = alarmas.filter(function(a){ return a.estado.tipo==='OK'; });

  var html = '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">';
  html += badge(vencidas.length, 'VENCIDAS', '#e74c3c', 'rgba(231,76,60,0.15)');
  html += badge(proximas.length, '≤15 DÍAS', '#f39c12', 'rgba(243,156,18,0.15)');
  html += badge(sinFecha.length, 'SIN FECHA', '#888',   'rgba(255,255,255,0.07)');
  html += badge(ok.length,       'AL DÍA',   '#2ecc71', 'rgba(46,204,113,0.12)');
  html += '</div>';

  var urgentes = vencidas.concat(proximas).sort(function(a,b){ return (a.estado.dias||0)-(b.estado.dias||0); });
  if(urgentes.length){
    html += '<div style="display:flex;flex-direction:column;gap:6px">';
    urgentes.forEach(function(a){
      var col  = a.estado.tipo==='VENCIDA' ? '#e74c3c' : '#f39c12';
      var txt  = a.estado.tipo==='VENCIDA'
        ? 'Vencida hace '+a.estado.dias+' días'
        : 'Vence en '+a.estado.dias+' días';
      html += '<div style="display:flex;align-items:center;gap:10px;padding:6px 10px;background:rgba(255,255,255,0.04);border-radius:7px;border-left:3px solid '+col+'">'
            + '<div style="flex:1"><span style="font-weight:700;color:#fff">'+escHtml(a.task.maquina)+'</span>'
            + ' <span style="color:rgba(255,255,255,0.5);font-size:0.8rem">'+escHtml(a.task.tarea)+'</span></div>'
            + '<span style="font-size:0.75rem;font-weight:700;color:'+col+';white-space:nowrap">'+txt+'</span>'
            + '</div>';
    });
    html += '</div>';
  } else if(sinFecha.length === alarmas.length){
    html += '<div style="color:rgba(255,255,255,0.3);font-size:0.82rem">Ve a ⚙️ Configuración para introducir las fechas de última realización.</div>';
  } else {
    html += '<div style="color:#2ecc71;font-size:0.82rem">✅ Todos los mantenimientos al día.</div>';
  }
  el.innerHTML = html;
}

function badge(n, label, color, bg){
  return '<div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:'+bg+';border:1px solid '+color+'33;border-radius:8px">'
       + '<span style="font-size:1.1rem;font-weight:900;color:'+color+'">'+n+'</span>'
       + '<span style="font-size:0.7rem;font-weight:700;color:'+color+';letter-spacing:.08em">'+label+'</span>'
       + '</div>';
}

function cargarFechasRealizacion(){
  DB.ref('config/ultima_realizacion').once('value').then(function(snap){
    var ur = snap.val() || {};
    renderFechasRealizacion(ur);
  }).catch(function(){ renderFechasRealizacion({}); });
}

function renderFechasRealizacion(ur){
  var tbody = document.getElementById('fechasBody');
  if(!tbody) return;
  var freqCol = {TRIMESTRAL:'rgba(52,152,219,0.8)',SEMESTRAL:'rgba(155,89,182,0.8)',ANUAL:'rgba(231,76,60,0.8)'};
  tbody.innerHTML = PERIODIC_TASKS.map(function(t){
    var rec     = ur[t.id] || {};
    var ultima  = rec.fecha || '';
    var proxima = proximaFecha(ultima, t.frecuencia);
    var estado  = estadoAlarma(proxima);
    var proxStr = proxima ? proxima.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
    var stCol   = {VENCIDA:'#e74c3c', PROXIMA:'#f39c12', OK:'#2ecc71', SIN_FECHA:'rgba(255,255,255,0.3)'}[estado.tipo];
    var stTxt   = {VENCIDA:'⚠️ Vencida '+estado.dias+'d', PROXIMA:'🔔 '+estado.dias+' días', OK:'✅ Al día', SIN_FECHA:'— Sin fecha'}[estado.tipo];
    var fc = freqCol[t.frecuencia]||'#aaa';
    return '<tr style="border-top:1px solid rgba(255,255,255,0.06)" id="fr-'+t.id+'">'
      + '<td style="padding:8px 12px;font-weight:700;color:rgba(255,255,255,0.85)">'+escHtml(t.maquina)+'</td>'
      + '<td style="padding:8px 12px;color:rgba(255,255,255,0.7);font-size:0.8rem">'+escHtml(t.tarea)+'</td>'
      + '<td style="padding:8px 12px"><span style="font-size:0.7rem;font-weight:700;color:'+fc+'">'+t.frecuencia+'</span></td>'
      + '<td style="padding:8px 10px"><input type="date" value="'+ultima+'" onchange="guardarFechaRealizacion(\''+t.id+'\',this.value)" style="background:var(--navy-deep,#131d28);color:#f0f4f8;border:1px solid rgba(255,255,255,0.18);border-radius:6px;padding:5px 8px;font-family:inherit;font-size:0.82rem;width:140px"></td>'
      + '<td style="padding:8px 12px;color:rgba(255,255,255,0.5);font-size:0.8rem;white-space:nowrap">'+proxStr+'</td>'
      + '<td style="padding:8px 12px;font-size:0.78rem;font-weight:700;color:'+stCol+';white-space:nowrap">'+stTxt+'</td>'
      + '</tr>';
  }).join('');
}

function guardarFechaRealizacion(id, fecha){
  if(!fecha) return;
  DB.ref('config/ultima_realizacion/'+id).update({fecha:fecha}).then(function(){
    showToast('✅ Fecha guardada');
    cargarFechasRealizacion();
    cargarAlarmasPreventivo();
  }).catch(function(e){ showToast('❌ Error: '+e.message); });
}

</script>
